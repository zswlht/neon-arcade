<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>霓虹扫雷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-0: #05071a;
      --bg-1: #0a0f35;
      --neon-cyan: #22f5ff;
      --neon-pink: #ff3ea5;
      --neon-purple: #c26bff;
      --neon-yellow: #ffec42;
      --neon-green: #22ff8f;
      --text: #e6f2ff;
      --text-dim: rgba(230, 242, 255, 0.65);
      --panel: rgba(20, 26, 70, 0.55);
      --panel-border: rgba(80, 160, 255, 0.35);
      --neon-orange: #ff8c42;
      --neon-purple-2: #b24bff;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Orbitron", "Segoe UI", "PingFang SC", sans-serif;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(194, 107, 255, 0.18), transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(34, 245, 255, 0.18), transparent 60%),
        linear-gradient(180deg, var(--bg-0) 0%, #02021a 100%);
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(120, 180, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 180, 255, 0.08) 1px, transparent 1px);
      background-size: 48px 48px;
      transform: perspective(800px) rotateX(60deg) translateY(20%);
      transform-origin: center top;
      opacity: 0.6;
      pointer-events: none;
      animation: gridScroll 12s linear infinite;
      z-index: 0;
    }

    @keyframes gridScroll {
      0% { background-position: 0 0; }
      100% { background-position: 0 480px; }
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.03) 0 1px,
        transparent 1px 4px
      );
      mix-blend-mode: overlay;
      z-index: 1;
    }

    .top-bar {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 28px 16px 12px;
    }

    .title {
      margin: 0;
      font-family: "Press Start 2P", "Orbitron", monospace;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: 4px;
      line-height: 1.2;
    }

    .title-neon {
      color: var(--neon-cyan);
      text-shadow:
        0 0 8px rgba(34, 245, 255, 0.8),
        0 0 22px rgba(34, 245, 255, 0.55),
        0 0 44px rgba(34, 245, 255, 0.35);
      animation: pulse 2.2s ease-in-out infinite;
    }

    .title-neon.alt {
      color: var(--neon-purple-2);
      text-shadow:
        0 0 8px rgba(178, 75, 255, 0.8),
        0 0 22px rgba(178, 75, 255, 0.55),
        0 0 44px rgba(178, 75, 255, 0.35);
      animation-delay: 1.1s;
    }

    .title-slash {
      color: #fff;
      margin: 0 6px;
      opacity: 0.9;
    }

    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--text-dim);
      letter-spacing: 6px;
      font-size: 13px;
    }

    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 30px;
      gap: 16px;
    }

    /* 信息栏 */
    .info-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .info-item {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
      min-width: 90px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow:
        0 0 0 1px rgba(34, 245, 255, 0.1) inset,
        0 4px 20px rgba(34, 245, 255, 0.08);
    }

    .info-item h3 {
      margin: 0 0 6px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(34, 245, 255, 0.5);
    }

    .info-item .value {
      font-family: "Press Start 2P", monospace;
      font-size: 18px;
      color: #fff;
      letter-spacing: 2px;
      text-shadow:
        0 0 6px rgba(255, 236, 66, 0.9),
        0 0 16px rgba(255, 236, 66, 0.4);
      font-variant-numeric: tabular-nums;
    }

    #mines-left { color: var(--neon-pink); text-shadow: 0 0 6px rgba(255, 62, 165, 0.9), 0 0 16px rgba(255, 62, 165, 0.4); }
    #timer { color: var(--neon-yellow); }
    #best { color: var(--neon-green); text-shadow: 0 0 6px rgba(34, 255, 143, 0.9), 0 0 16px rgba(34, 255, 143, 0.4); }

    /* 难度选择 */
    .difficulty-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      background: transparent;
      border: 1px solid var(--panel-border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .diff-btn:hover {
      background: rgba(34, 245, 255, 0.08);
      border-color: rgba(34, 245, 255, 0.4);
      color: #fff;
    }

    .diff-btn.active {
      background: linear-gradient(135deg, rgba(34, 245, 255, 0.2), rgba(178, 75, 255, 0.2));
      border-color: rgba(34, 245, 255, 0.6);
      color: #fff;
      box-shadow: 0 0 14px rgba(34, 245, 255, 0.4), inset 0 0 10px rgba(178, 75, 255, 0.15);
    }

    /* 棋盘框 */
    .board-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .board-frame {
      position: relative;
      padding: 8px;
      background: rgba(10, 12, 35, 0.6);
      border: 1px solid rgba(34, 245, 255, 0.4);
      border-radius: 12px;
      box-shadow:
        0 0 30px rgba(34, 245, 255, 0.15),
        inset 0 0 20px rgba(34, 245, 255, 0.05);
    }

    .board-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan);
    }
    .board-corner.tl { top: -3px; left: -3px; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
    .board-corner.tr { top: -3px; right: -3px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
    .board-corner.bl { bottom: -3px; left: -3px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
    .board-corner.br { bottom: -3px; right: -3px; border-left: none; border-top: none; border-radius: 0 0 8px 0; }

    /* 游戏区域 */
    .game-area {
      position: relative;
      background: rgba(10, 10, 30, 0.8);
      border-radius: 6px;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    /* 覆盖层 */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 15, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 10;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 3px;
      text-shadow: 0 0 15px currentColor;
    }

    .overlay.win h2 {
      color: var(--neon-green);
    }

    .overlay.lose h2 {
      color: var(--neon-pink);
    }

    .overlay p {
      color: var(--text-dim);
      font-size: 14px;
    }

    .overlay .time-info {
      color: var(--neon-yellow);
      font-size: 16px;
    }

    .btn {
      background: transparent;
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 25px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .btn:hover, .btn:active {
      background: var(--neon-cyan);
      color: var(--bg);
    }

    .btn-secondary {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    .btn-secondary:hover {
      background: var(--text-dim);
      color: var(--bg);
    }

    /* 底部按钮 */
    .bottom-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .small-btn {
      background: rgba(20, 26, 70, 0.55);
      border: 1px solid var(--panel-border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.2s ease;
    }

    .small-btn:hover {
      border-color: rgba(34, 245, 255, 0.5);
      color: var(--neon-cyan);
      background: rgba(34, 245, 255, 0.08);
      box-shadow: 0 0 10px rgba(34, 245, 255, 0.2);
    }

    /* 玩法说明 */
    .how-to-play {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      max-width: 400px;
      line-height: 1.7;
    }

    kbd {
      display: inline-block;
      min-width: 22px;
      padding: 2px 6px;
      font-family: "Press Start 2P", monospace;
      font-size: 10px;
      line-height: 1;
      text-align: center;
      color: var(--neon-cyan);
      background: rgba(34, 245, 255, 0.08);
      border: 1px solid rgba(34, 245, 255, 0.4);
      border-radius: 6px;
      box-shadow:
        0 1px 0 rgba(34, 245, 255, 0.4) inset,
        0 0 12px rgba(34, 245, 255, 0.2);
    }

    /* 底部文字 */
    .foot {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px 16px 30px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* 移动端 */
    @media (max-width: 500px) {
      .top-bar {
        padding: 20px 16px 8px;
      }

      .info-item {
        padding: 8px 12px;
        min-width: 75px;
      }

      .info-item .value {
        font-size: 14px;
      }

      .info-item h3 {
        font-size: 10px;
      }

      .game-area {
        max-width: calc(100vw - 40px);
      }

      canvas {
        max-width: 100%;
        height: auto;
      }

      .how-to-play {
        display: none;
      }

      .diff-btn {
        padding: 5px 10px;
        font-size: 10px;
      }

      .bottom-btns {
        margin: 10px 0 5px;
      }
    }

    /* 动画 */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.3s ease-in-out;
    }

    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--neon-purple);
      background: rgba(20, 20, 30, 0.9);
      border: 1px solid rgba(178, 75, 255, 0.4);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(178, 75, 255, 0.2);
    }
    .back-btn:hover {
      background: rgba(178, 75, 255, 0.15);
      transform: translateX(-2px);
      box-shadow: 0 0 20px rgba(178, 75, 255, 0.4);
    }
    .top-bar {
      padding-left: 100px;
      padding-right: 100px;
    }
    @media (max-width: 500px) {
      .back-btn {
        top: 10px;
        left: 10px;
        padding: 8px 12px;
        font-size: 11px;
      }
      .top-bar {
        padding-left: 70px;
        padding-right: 20px;
      }
      .title {
        font-size: 20px !important;
        letter-spacing: 2px !important;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <a href="index.html" class="back-btn">← 返回</a>

  <header class="top-bar">
    <h1 class="title">
      <span class="title-neon">霓虹</span>
      <span class="title-neon alt">扫雷</span>
    </h1>
    <p class="subtitle">— 霓虹扫雷 —</p>
  </header>

  <main class="stage">
    <div class="info-bar">
      <div class="info-item">
        <h3>剩余雷</h3>
        <div class="value" id="mines-left">10</div>
      </div>
      <div class="info-item">
        <h3>时间</h3>
        <div class="value" id="timer">000</div>
      </div>
      <div class="info-item">
        <h3>最佳</h3>
        <div class="value" id="best">---</div>
      </div>
    </div>

    <div class="difficulty-selector">
      <button class="diff-btn active" data-difficulty="beginner">初级</button>
      <button class="diff-btn" data-difficulty="intermediate">中级</button>
      <button class="diff-btn" data-difficulty="expert">高级</button>
    </div>

    <div class="board-wrap">
      <div class="board-frame">
        <div class="board-corner tl"></div>
        <div class="board-corner tr"></div>
        <div class="board-corner bl"></div>
        <div class="board-corner br"></div>

        <div class="game-area" id="gameArea">
          <canvas id="gameCanvas"></canvas>

          <div class="overlay hidden" id="winOverlay">
            <h2>🎉 胜利!</h2>
            <p class="time-info">用时 <span id="winTime">0</span> 秒</p>
            <p id="winMsg"></p>
            <button class="btn" id="nextGameBtn">再来一局</button>
          </div>

          <div class="overlay hidden lose" id="loseOverlay">
            <h2>💥 踩雷了!</h2>
            <p>别灰心，再试一次</p>
            <button class="btn" id="retryBtn">重新开始</button>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-btns">
      <button class="small-btn" id="resetBtn">↺ 重置</button>
      <button class="small-btn" id="helpBtn">❓ 玩法</button>
      <button class="small-btn" id="soundBtn">🔊 音效</button>
    </div>

    <div class="how-to-play">
      <kbd>点击</kbd> 揭开格子 | <kbd>长按</kbd> 标记旗帜 | 揭开所有安全格子获胜<br>
      数字表示周围8格中的雷数，合理推理找出所有雷
    </div>
  </main>

  <footer class="foot">
    <span>· 每一步都是概率与直觉的博弈 ·</span>
  </footer>

  <script>
    // ==================== 配置 ====================
    const DIFFICULTIES = {
      beginner: { cols: 9, rows: 9, mines: 10, name: '初级' },
      intermediate: { cols: 16, rows: 16, mines: 40, name: '中级' },
      expert: { cols: 20, rows: 24, mines: 99, name: '高级' }
    };

    // 数字颜色
    const NUM_COLORS = {
      1: '#22f5ff',  // 青
      2: '#22ff8f',  // 绿
      3: '#ffb84d',  // 黄
      4: '#ff8c42',  // 橙
      5: '#ff3e64',  // 红
      6: '#b24bff',  // 紫
      7: '#ffffff',  // 白
      8: '#888888'   // 灰
    };

    // ==================== 音效系统 ====================
    let audioCtx = null;
    let soundEnabled = true;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playSound(type) {
      if (!soundEnabled) return;

      try {
        const ctx = initAudio();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        const now = ctx.currentTime;

        switch(type) {
          case 'click':
            // 点击音效 - 清脆的"叮"
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
            break;

          case 'flag':
            // 标记音效 - 低沉的"咚"
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            break;

          case 'explode':
            // 爆炸音效 - 沉闷的"轰"
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
            break;

          case 'win':
            // 胜利音效 - 上升音阶
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
              const o = ctx.createOscillator();
              const g = ctx.createGain();
              o.connect(g);
              g.connect(ctx.destination);
              o.type = 'sine';
              o.frequency.setValueAtTime(freq, now + i * 0.12);
              g.gain.setValueAtTime(0, now + i * 0.12);
              g.gain.linearRampToValueAtTime(0.15, now + i * 0.12 + 0.02);
              g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.3);
              o.start(now + i * 0.12);
              o.stop(now + i * 0.12 + 0.3);
            });
            return; // 单独处理

          case 'unflag':
            // 取消标记音效 - 短促
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
            break;
        }
      } catch (e) {
        console.log('Audio error:', e);
      }
    }

    // ==================== 游戏状态 ====================
    let currentDifficulty = 'beginner';
    let cols, rows, mines;
    let board = [];         // 0=未揭开, -1=雷, 1-8=数字
    let revealed = [];      // 是否揭开
    let flagged = [];       // 是否标记
    let gameStarted = false;
    let gameOver = false;
    let win = false;
    let startTime = 0;
    let timerInterval = null;
    let time = 0;

    // 画布
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameArea = document.getElementById('gameArea');
    let CELL_SIZE = 32;
    const PADDING = 2;

    // DOM
    const minesLeftEl = document.getElementById('mines-left');
    const timerEl = document.getElementById('timer');
    const bestEl = document.getElementById('best');
    const winOverlay = document.getElementById('winOverlay');
    const loseOverlay = document.getElementById('loseOverlay');
    const winTimeEl = document.getElementById('winTime');
    const winMsgEl = document.getElementById('winMsg');

    // ==================== 游戏逻辑 ====================
    function initGame() {
      const config = DIFFICULTIES[currentDifficulty];
      cols = config.cols;
      rows = config.rows;
      mines = config.mines;

      // 重置状态
      gameStarted = false;
      gameOver = false;
      win = false;
      time = 0;
      clearInterval(timerInterval);
      timerInterval = null;

      // 重置缩放和偏移
      viewOffsetX = 0;
      viewOffsetY = 0;
      currentScale = 1;
      isPinching = false;
      isDragging = false;
      if (canvas.style.transform) {
        canvas.style.transform = '';
      }

      // 初始化数组
      board = [];
      revealed = [];
      flagged = [];
      for (let y = 0; y < rows; y++) {
        board[y] = [];
        revealed[y] = [];
        flagged[y] = [];
        for (let x = 0; x < cols; x++) {
          board[y][x] = 0;
          revealed[y][x] = false;
          flagged[y][x] = false;
        }
      }

      // 更新显示
      updateMinesLeft();
      updateTimer();
      updateBestDisplay();

      // 隐藏覆盖层
      winOverlay.classList.add('hidden');
      loseOverlay.classList.add('hidden');

      // 设置画布大小
      resizeCanvas();

      // 绘制
      draw();
    }

    function placeMines(firstClickX, firstClickY) {
      // 确保第一次点击安全
      const safeZone = new Set();
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = firstClickX + dx;
          const ny = firstClickY + dy;
          if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
            safeZone.add(`${nx},${ny}`);
          }
        }
      }

      let placed = 0;
      while (placed < mines) {
        const x = Math.floor(Math.random() * cols);
        const y = Math.floor(Math.random() * rows);

        if (!safeZone.has(`${x},${y}`) && board[y][x] !== -1) {
          board[y][x] = -1;
          placed++;
        }
      }

      // 计算数字
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (board[y][x] === -1) continue;

          let count = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx;
              const ny = y + dy;
              if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && board[ny][nx] === -1) {
                count++;
              }
            }
          }
          board[y][x] = count;
        }
      }
    }

    function reveal(x, y) {
      if (x < 0 || x >= cols || y < 0 || y >= rows) return;
      if (revealed[y][x] || flagged[y][x]) return;

      revealed[y][x] = true;

      // 踩雷
      if (board[y][x] === -1) {
        gameOver = true;
        win = false;
        playSound('explode');
        revealAllMines();
        showLose();
        return;
      }

      playSound('click');

      // 空白格，递归展开
      if (board[y][x] === 0) {
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx !== 0 || dy !== 0) {
              reveal(x + dx, y + dy);
            }
          }
        }
      }

      checkWin();
      draw();
    }

    function toggleFlag(x, y) {
      if (revealed[y][x]) return;

      flagged[y][x] = !flagged[y][x];
      playSound(flagged[y][x] ? 'flag' : 'unflag');
      updateMinesLeft();
      draw();
    }

    function chord(x, y) {
      // 快速展开：数字周围旗数等于数字时，自动揭开其他格
      if (!revealed[y][x] || board[y][x] <= 0) return;

      let flagCount = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          const nx = x + dx;
          const ny = y + dy;
          if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && flagged[ny][nx]) {
            flagCount++;
          }
        }
      }

      if (flagCount === board[y][x]) {
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = x + dx;
            const ny = y + dy;
            if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !revealed[ny][nx] && !flagged[ny][nx]) {
              reveal(nx, ny);
            }
          }
        }
      }
    }

    function checkWin() {
      let unrevealed = 0;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (!revealed[y][x] && board[y][x] !== -1) {
            unrevealed++;
          }
        }
      }

      if (unrevealed === 0) {
        gameOver = true;
        win = true;
        stopTimer();
        showWin();
      }
    }

    function revealAllMines() {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (board[y][x] === -1) {
            revealed[y][x] = true;
          }
        }
      }
      draw();
    }

    // ==================== 计时器 ====================
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        time = Math.floor((Date.now() - startTime) / 1000);
        updateTimer();
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function updateTimer() {
      timerEl.textContent = String(Math.min(time, 999)).padStart(3, '0');
    }

    function updateMinesLeft() {
      let flagCount = 0;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (flagged[y][x]) flagCount++;
        }
      }
      minesLeftEl.textContent = mines - flagCount;
    }

    function updateBestDisplay() {
      const best = localStorage.getItem(`minesweeper_best_${currentDifficulty}`);
      if (best) {
        bestEl.textContent = best + 's';
      } else {
        bestEl.textContent = '---';
      }
    }

    function saveBest() {
      const key = `minesweeper_best_${currentDifficulty}`;
      const current = localStorage.getItem(key);
      if (!current || time < parseInt(current)) {
        localStorage.setItem(key, time);
        updateBestDisplay();
      }
    }

    // ==================== UI ====================
    function showWin() {
      saveBest();
      playSound('win');
      winTimeEl.textContent = time;

      // 根据时间给出评价
      let msg = '';
      if (time < 30) {
        msg = '🌟 神速! 非凡实力!';
      } else if (time < 60) {
        msg = '👏 非常棒! 继续保持!';
      } else if (time < 120) {
        msg = '👍 不错! 再接再厉!';
      } else {
        msg = '💪 过关就是胜利!';
      }
      winMsgEl.textContent = msg;

      winOverlay.classList.remove('hidden');
      winOverlay.classList.add('win');
    }

    function showLose() {
      stopTimer();
      gameArea.classList.add('shake');
      setTimeout(() => gameArea.classList.remove('shake'), 300);
      loseOverlay.classList.remove('hidden');
    }

    // ==================== 绘制 ====================
    function resizeCanvas() {
      const isPortrait = window.innerHeight > window.innerWidth;
      const isExpert = currentDifficulty === 'expert';

      const maxWidth = window.innerWidth - 32;
      const availableHeight = window.innerHeight - 300;

      let sizeByWidth = Math.floor(maxWidth / cols);
      let sizeByHeight = Math.floor(availableHeight / rows);

      CELL_SIZE = Math.min(sizeByWidth, sizeByHeight);
      CELL_SIZE = Math.max(18, Math.min(CELL_SIZE, 32));

      canvas.width = cols * CELL_SIZE;
      canvas.height = rows * CELL_SIZE;

      gameArea.style.width = canvas.width + 'px';
    }

    function draw() {
      ctx.fillStyle = '#0a0a18';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          drawCell(x, y);
        }
      }
    }

    function drawCell(x, y) {
      const px = x * CELL_SIZE;
      const py = y * CELL_SIZE;
      const size = CELL_SIZE - PADDING * 2;

      if (!revealed[y][x]) {
        // 未揭开 - 霓虹玻璃方块
        if (flagged[y][x]) {
          // 标记旗帜 - 金色边框
          ctx.fillStyle = 'rgba(255, 180, 50, 0.15)';
          ctx.fillRect(px + PADDING, py + PADDING, size, size);
          // 金色边框
          ctx.strokeStyle = 'rgba(255, 180, 50, 0.6)';
          ctx.lineWidth = 1;
          ctx.strokeRect(px + PADDING + 0.5, py + PADDING + 0.5, size - 1, size - 1);
          drawFlag(px + CELL_SIZE / 2, py + CELL_SIZE / 2);
        } else {
          // 普通未揭开 - 霓虹玻璃质感（更亮）
          // 底色
          ctx.fillStyle = '#2a2a5a';
          ctx.fillRect(px + PADDING, py + PADDING, size, size);

          // 渐变高光（上浅下深，立体凸起感）
          const grad = ctx.createLinearGradient(px + PADDING, py + PADDING, px + PADDING, py + CELL_SIZE - PADDING);
          grad.addColorStop(0, 'rgba(140, 160, 255, 0.4)');
          grad.addColorStop(0.4, 'rgba(100, 120, 220, 0.2)');
          grad.addColorStop(1, 'rgba(40, 40, 100, 0.3)');
          ctx.fillStyle = grad;
          ctx.fillRect(px + PADDING, py + PADDING, size, size);

          // 霓虹边框（微发光效果）
          ctx.strokeStyle = 'rgba(120, 150, 255, 0.5)';
          ctx.lineWidth = 1;
          ctx.strokeRect(px + PADDING + 0.5, py + PADDING + 0.5, size - 1, size - 1);

          // 左上角亮边（凸起感）
          ctx.fillStyle = 'rgba(180, 200, 255, 0.3)';
          ctx.fillRect(px + PADDING, py + PADDING, size, 2);
          ctx.fillRect(px + PADDING, py + PADDING, 2, size);

          // 右下角暗边
          ctx.fillStyle = 'rgba(20, 20, 60, 0.3)';
          ctx.fillRect(px + PADDING, py + CELL_SIZE - PADDING - 2, size, 2);
          ctx.fillRect(px + CELL_SIZE - PADDING - 2, py + PADDING, 2, size);
        }
      } else {
        // 已揭开 - 深色凹陷
        if (board[y][x] === -1) {
          // 雷
          drawMine(px + CELL_SIZE / 2, py + CELL_SIZE / 2);
        } else if (board[y][x] > 0) {
          // 数字 - 深色凹陷底
          ctx.fillStyle = '#0d0d1a';
          ctx.fillRect(px + PADDING, py + PADDING, size, size);
          // 内边框
          ctx.strokeStyle = 'rgba(50, 50, 80, 0.3)';
          ctx.lineWidth = 1;
          ctx.strokeRect(px + PADDING + 0.5, py + PADDING + 0.5, size - 1, size - 1);
          drawNumber(px + CELL_SIZE / 2, py + CELL_SIZE / 2, board[y][x]);
        } else {
          // 空白
          ctx.fillStyle = '#0d0d1a';
          ctx.fillRect(px + PADDING, py + PADDING, size, size);
          ctx.strokeStyle = 'rgba(50, 50, 80, 0.2)';
          ctx.lineWidth = 1;
          ctx.strokeRect(px + PADDING + 0.5, py + PADDING + 0.5, size - 1, size - 1);
        }
      }
    }

    function drawNumber(x, y, num) {
      ctx.fillStyle = NUM_COLORS[num] || '#fff';
      ctx.shadowColor = NUM_COLORS[num] || '#fff';
      ctx.shadowBlur = 8;
      ctx.font = `bold ${CELL_SIZE * 0.6}px Orbitron`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(num, x, y);
      ctx.shadowBlur = 0;
    }

    function drawFlag(x, y) {
      const flagSize = CELL_SIZE * 0.35;
      ctx.fillStyle = '#ffb84d';
      ctx.shadowColor = '#ffb84d';
      ctx.shadowBlur = 8;

      // 旗杆
      ctx.fillRect(x - flagSize * 0.5, y - flagSize * 0.8, 2, flagSize * 1.6);

      // 旗面
      ctx.beginPath();
      ctx.moveTo(x - flagSize * 0.5 + 2, y - flagSize * 0.8);
      ctx.lineTo(x + flagSize * 0.5, y - flagSize * 0.3);
      ctx.lineTo(x - flagSize * 0.5 + 2, y + flagSize * 0.1);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
    }

    function drawMine(x, y) {
      const mineSize = CELL_SIZE * 0.35;

      ctx.fillStyle = '#ff3e64';
      ctx.shadowColor = '#ff3e64';
      ctx.shadowBlur = 15;

      // 圆形
      ctx.beginPath();
      ctx.arc(x, y, mineSize, 0, Math.PI * 2);
      ctx.fill();

      // 光芒
      ctx.strokeStyle = '#ff3e64';
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * mineSize * 0.6, y + Math.sin(angle) * mineSize * 0.6);
        ctx.lineTo(x + Math.cos(angle) * mineSize * 1.3, y + Math.sin(angle) * mineSize * 1.3);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
    }

    // ==================== 事件处理 ====================
    let touchTimer = null;
    let touched = false;
    let isPinching = false;
    let initialPinchDistance = 0;
    let initialScale = 1;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let viewOffsetX = 0;
    let viewOffsetY = 0;
    let currentScale = 1;
    let touchStartX = 0;
    let touchStartY = 0;
    const MOVE_THRESHOLD = 10;

    function setupEvents() {
      // 画布点击
      canvas.addEventListener('click', handleClick);
      canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        handleRightClick(e);
      });

      // 触摸事件
      canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
      canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
      canvas.addEventListener('touchmove', handleTouchMove, { passive: false });

      // 难度选择
      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentDifficulty = btn.dataset.difficulty;
          initGame();
        });
      });

      // 按钮
      document.getElementById('resetBtn').addEventListener('click', initGame);
      document.getElementById('nextGameBtn').addEventListener('click', initGame);
      document.getElementById('retryBtn').addEventListener('click', initGame);
      document.getElementById('helpBtn').addEventListener('click', () => {
        alert('🎮 霓虹扫雷玩法：\n\n📱 手机操作：\n1. 点击揭开格子\n2. 长按（500ms）标记旗帜\n3. 双指捏合放大/缩小\n4. 放大后单指拖动查看\n\n⌨️ 电脑操作：\n1. 左键点击揭开\n2. 右键点击标记\n3. 点击数字快速展开\n\n📋 游戏规则：\n- 数字表示周围8格中的雷数\n- 揭开所有安全格子获胜\n- 第一次点击保证安全\n\n💡 技巧：\n- 数字周围旗数等于数字时，点击数字可快速展开\n- 善用数字逻辑推理找出所有雷');
      });

      // 音效开关
      const soundBtn = document.getElementById('soundBtn');
      soundBtn.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundBtn.textContent = soundEnabled ? '🔊 音效' : '🔇 静音';
        soundBtn.style.color = soundEnabled ? '' : '#888';
        if (soundEnabled) {
          playSound('click');
        }
      });

      // 窗口大小改变
      window.addEventListener('resize', () => {
        resizeCanvas();
        draw();
      });
    }

    function handleClick(e) {
      if (gameOver) return;

      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);

      if (x < 0 || x >= cols || y < 0 || y >= rows) return;

      if (!revealed[y][x]) {
        if (!gameStarted) {
          gameStarted = true;
          placeMines(x, y);
          startTimer();
        }
        reveal(x, y);
      } else {
        chord(x, y);
      }
    }

    function handleRightClick(e) {
      if (gameOver) return;

      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);

      if (x < 0 || x >= cols || y < 0 || y >= rows) return;

      if (!revealed[y][x]) {
        if (!gameStarted) {
          gameStarted = true;
          placeMines(x, y);
          startTimer();
        }
        toggleFlag(x, y);
      }
    }

    function handleTouchStart(e) {
      e.preventDefault();

      // 双指缩放
      if (e.touches.length === 2) {
        isPinching = true;
        touched = false;
        if (touchTimer) {
          clearTimeout(touchTimer);
          touchTimer = null;
        }
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        initialPinchDistance = Math.sqrt(dx * dx + dy * dy);
        initialScale = currentScale;
        return;
      }

      // 单指操作
      if (e.touches.length === 1 && !isPinching) {
        touched = true;
        isDragging = false;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;

        // 如果放大了，准备拖动（但要等移动超过阈值才开始）
        if (currentScale > 1) {
          dragStartX = e.touches[0].clientX - viewOffsetX;
          dragStartY = e.touches[0].clientY - viewOffsetY;
        }

        const x = getCellX(e.touches[0]);
        const y = getCellY(e.touches[0]);

        if (x < 0 || x >= cols || y < 0 || y >= rows) return;

        // 长按标记
        touchTimer = setTimeout(() => {
          if (touched && !gameOver) {
            if (!revealed[y][x]) {
              if (!gameStarted) {
                gameStarted = true;
                placeMines(x, y);
                startTimer();
              }
              toggleFlag(x, y);
            }
            touched = false;
          }
        }, 500);
      }
    }

    function handleTouchMove(e) {
      e.preventDefault();

      // 双指缩放
      if (e.touches.length === 2 && isPinching) {
        if (touchTimer) {
          clearTimeout(touchTimer);
          touchTimer = null;
        }
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const currentDistance = Math.sqrt(dx * dx + dy * dy);

        const scale = currentDistance / initialPinchDistance;
        const newScale = initialScale * scale;

        currentScale = Math.max(1, Math.min(newScale, 2.5));
        clampViewOffset();
        applyTransform();
        return;
      }

      // 单指移动
      if (e.touches.length === 1 && !isPinching) {
        const moveX = e.touches[0].clientX - touchStartX;
        const moveY = e.touches[0].clientY - touchStartY;
        const moveDist = Math.sqrt(moveX * moveX + moveY * moveY);

        // 如果放大了且移动超过阈值，进入拖动模式
        if (currentScale > 1 && moveDist > MOVE_THRESHOLD) {
          isDragging = true;
          touched = false;
          if (touchTimer) {
            clearTimeout(touchTimer);
            touchTimer = null;
          }
        }

        if (isDragging) {
          viewOffsetX = e.touches[0].clientX - dragStartX;
          viewOffsetY = e.touches[0].clientY - dragStartY;
          clampViewOffset();
          applyTransform();
          return;
        }

        // 未放大且移动超过阈值，取消点击/长按
        if (currentScale <= 1 && moveDist > MOVE_THRESHOLD) {
          touched = false;
          if (touchTimer) {
            clearTimeout(touchTimer);
            touchTimer = null;
          }
        }
      }
    }

    function applyTransform() {
      canvas.style.transformOrigin = 'top left';
      canvas.style.transform = `translate(${viewOffsetX}px, ${viewOffsetY}px) scale(${currentScale})`;
    }

    function getCellX(touch) {
      const rect = canvas.getBoundingClientRect();
      const ratio = (touch.clientX - rect.left) / rect.width;
      return Math.floor(ratio * cols);
    }

    function getCellY(touch) {
      const rect = canvas.getBoundingClientRect();
      const ratio = (touch.clientY - rect.top) / rect.height;
      return Math.floor(ratio * rows);
    }

    function clampViewOffset() {
      if (currentScale <= 1) {
        viewOffsetX = 0;
        viewOffsetY = 0;
        return;
      }

      const scaledWidth = canvas.width * currentScale;
      const scaledHeight = canvas.height * currentScale;
      const visibleWidth = gameArea.clientWidth;
      const visibleHeight = gameArea.clientHeight;

      const maxOffsetX = Math.max(0, scaledWidth - visibleWidth);
      const maxOffsetY = Math.max(0, scaledHeight - visibleHeight);

      viewOffsetX = Math.min(0, Math.max(viewOffsetX, -maxOffsetX));
      viewOffsetY = Math.min(0, Math.max(viewOffsetY, -maxOffsetY));
    }

    function handleTouchEnd(e) {
      e.preventDefault();

      if (touchTimer) {
        clearTimeout(touchTimer);
        touchTimer = null;
      }

      // 双指缩放结束
      if (isPinching) {
        isPinching = false;
        touched = false;
        if (currentScale <= 1) {
          currentScale = 1;
          viewOffsetX = 0;
          viewOffsetY = 0;
          applyTransform();
        }
        return;
      }

      // 拖动结束
      if (isDragging) {
        isDragging = false;
        touched = false;
        return;
      }

      if (!touched || gameOver) {
        touched = false;
        return;
      }

      const x = getCellX(e.changedTouches[0]);
      const y = getCellY(e.changedTouches[0]);

      if (x < 0 || x >= cols || y < 0 || y >= rows) {
        touched = false;
        return;
      }

      if (!revealed[y][x]) {
        if (!gameStarted) {
          gameStarted = true;
          placeMines(x, y);
          startTimer();
        }
        reveal(x, y);
      } else {
        chord(x, y);
      }

      touched = false;
    }

    // ==================== 初始化 ====================
    setupEvents();
    initGame();
  </script>
</body>
</html>
