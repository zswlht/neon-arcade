<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>霓虹推箱子</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }

    :root {
      --neon-cyan: #22f5ff;
      --neon-pink: #ff3e64;
      --neon-green: #22ff8f;
      --neon-yellow: #ffb84d;
      --bg: #0a0a0f;
      --bg-card: rgba(20, 20, 30, 0.9);
      --text: #e0e0e0;
      --text-dim: #888;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Orbitron', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: 1.5rem;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
      margin: 15px 0 10px;
      letter-spacing: 3px;
    }

    /* 关卡信息栏 */
    .level-info {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .level-badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
    }

    .level-badge span {
      color: var(--neon-cyan);
      font-weight: bold;
    }

    .moves-badge span {
      color: var(--neon-yellow);
      font-weight: bold;
    }

    /* 游戏画布 */
    .game-area {
      position: relative;
      background: var(--bg-card);
      border: 2px solid var(--neon-cyan);
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(34,245,255,0.3);
      overflow: hidden;
      max-width: calc(100vw - 20px);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* 覆盖层 */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 15, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 10;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      font-size: 1.5rem;
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green);
      letter-spacing: 2px;
    }

    .overlay p {
      color: var(--text-dim);
      font-size: 14px;
    }

    .overlay .sub-text {
      font-size: 12px;
      color: var(--neon-yellow);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .btn {
      background: transparent;
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover, .btn:active {
      background: var(--neon-cyan);
      color: var(--bg);
    }

    .btn-secondary {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    .btn-secondary:hover, .btn-secondary:active {
      background: var(--text-dim);
      color: var(--bg);
    }

    /* 关卡选择 */
    .level-select {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      max-width: 280px;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    .level-btn {
      width: 45px;
      height: 35px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .level-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .level-btn.completed {
      border-color: var(--neon-green);
      color: var(--neon-green);
    }

    .level-btn.current {
      border-color: var(--neon-yellow);
      color: var(--neon-yellow);
      box-shadow: 0 0 10px rgba(255,184,77,0.3);
    }

    /* 方向控制 */
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 55px);
      grid-template-rows: repeat(2, 50px);
      gap: 6px;
      margin: 15px 0;
    }

    .ctrl-btn {
      background: var(--bg-card);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-size: 22px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:active {
      background: var(--neon-cyan);
      color: var(--bg);
      box-shadow: 0 0 15px var(--neon-cyan);
      transform: scale(0.95);
    }

    .ctrl-up { grid-column: 2; grid-row: 1; }
    .ctrl-left { grid-column: 1; grid-row: 2; }
    .ctrl-down { grid-column: 2; grid-row: 2; }
    .ctrl-right { grid-column: 3; grid-row: 2; }

    /* 底部按钮 */
    .bottom-btns {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .small-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .small-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    /* 关卡导航 */
    .level-nav {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 16px;
      width: 40px;
      height: 35px;
      border-radius: 4px;
      cursor: pointer;
    }

    .nav-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* 操作提示 */
    .hint {
      color: var(--text-dim);
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }

    kbd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
    }

    /* 移动端隐藏操作提示 */
    @media (max-width: 500px) {
      h1 {
        font-size: 1.2rem;
        margin: 8px 0 5px;
      }

      .level-info {
        margin-bottom: 5px;
      }

      .level-badge {
        padding: 4px 10px;
        font-size: 11px;
      }

      .game-area {
        max-width: calc(100vw - 16px);
      }

      canvas {
        max-width: 100%;
        height: auto;
      }

      .hint {
        display: none;
      }

      .controls {
        grid-template-columns: repeat(3, 55px);
        grid-template-rows: repeat(2, 50px);
        margin: 8px 0;
      }

      .ctrl-btn {
        font-size: 18px;
      }

      .bottom-btns, .level-nav {
        margin-top: 5px;
      }

      .bottom-btns .small-btn {
        padding: 6px 10px;
        font-size: 10px;
      }
    }

    /* 完成动画 */
    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .celebrating h2 {
      animation: celebrate 0.5s ease-in-out 3;
    }
  </style>
</head>
<body>
  <h1>霓虹推箱子</h1>

  <div class="level-info">
    <div class="level-badge">关卡 <span id="levelNum">1</span>/50</div>
    <div class="level-badge moves-badge">步数 <span id="moves">0</span></div>
  </div>

  <div class="game-area">
    <canvas id="gameCanvas"></canvas>

    <!-- 开始界面 -->
    <div class="overlay" id="startOverlay">
      <h2>推箱子</h2>
      <p>将所有箱子推到目标点</p>
      <div class="btn-group">
        <button class="btn" id="continueBtn">▶ 继续游戏</button>
        <button class="btn btn-secondary" id="selectLevelBtn">选择关卡</button>
      </div>
    </div>

    <!-- 关卡选择 -->
    <div class="overlay hidden" id="levelSelectOverlay">
      <h2>选择关卡</h2>
      <div class="level-select" id="levelSelect"></div>
      <button class="btn" id="backToStartBtn">返回</button>
    </div>

    <!-- 通关界面 -->
    <div class="overlay hidden" id="winOverlay">
      <h2>通关成功!</h2>
      <p>用了 <span id="winMoves">0</span> 步</p>
      <p class="sub-text" id="winSubText"></p>
      <div class="btn-group">
        <button class="btn" id="nextLevelBtn">下一关 ▶</button>
        <button class="btn btn-secondary" id="replayBtn">↺ 重玩</button>
      </div>
    </div>

    <!-- 全部通关 -->
    <div class="overlay hidden" id="allWinOverlay">
      <h2>恭喜通关!</h2>
      <p>你已经完成了全部50个关卡</p>
      <div class="btn-group">
        <button class="btn" id="restartAllBtn">从头开始</button>
        <button class="btn btn-secondary" id="selectLevelEndBtn">选择关卡</button>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="ctrl-btn ctrl-up" data-dir="up">▲</button>
    <button class="ctrl-btn ctrl-left" data-dir="left">◀</button>
    <button class="ctrl-btn ctrl-down" data-dir="down">▼</button>
    <button class="ctrl-btn ctrl-right" data-dir="right">▶</button>
  </div>

  <div class="bottom-btns">
    <button class="small-btn" id="undoBtn">↩ 撤销</button>
    <button class="small-btn" id="resetBtn">↺ 重置</button>
    <button class="small-btn" id="menuBtn">☰ 菜单</button>
  </div>

  <div class="level-nav">
    <button class="nav-btn" id="prevLevelBtn">◀</button>
    <button class="nav-btn" id="nextNavBtn">▶</button>
  </div>

  <div class="hint">
    <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移动 |
    <kbd>Z</kbd> 撤销 |

    // 尺寸设置
    let CELL_SIZE = 32;
    let gridWidth = 0;
    let gridHeight = 0;

    // ==================== 游戏逻辑 ====================
    function parseLevel(levelData) {
      grid = [];
      const maxWidth = Math.max(...levelData.map(row => row.length));

      for (let y = 0; y < levelData.length; y++) {
        grid[y] = [];
        for (let x = 0; x < maxWidth; x++) {
          const char = levelData[y][x] || ' ';
          // 解析关卡字符
          // 1=墙, 2=地板, 3=箱子, 4=目标点, 5=玩家, 6=箱子在目标上, 7=玩家在目标上
          const num = parseInt(char);
          if (!isNaN(num) && num >= 0 && num <= 7) {
            grid[y][x] = num;
            // 如果是玩家位置
            if (num === 5 || num === 7) {
              playerPos = { x, y };
            }
          } else {
            grid[y][x] = 0; // 空格或其他字符为空
          }
        }
      }

      gridHeight = grid.length;
      gridWidth = grid[0].length;
    }

    function loadLevel(levelIndex) {
      currentLevel = levelIndex;
      moves = 0;
      history = [];
      parseLevel(LEVELS[levelIndex]);
      resizeCanvas();
      updateDisplay();
      draw();
    }

      const screenWidth = Math.min(window.innerWidth - 40, 400);
      CELL_SIZE = Math.floor(screenWidth / gridWidth);
      CELL_SIZE = Math.max(20, Math.min(CELL_SIZE, 32)); // 限制在20-32之间

      canvas.width = gridWidth * CELL_SIZE;
      canvas.height = gridHeight * CELL_SIZE;
      draw();
    }

    function updateDisplay() {
      levelNumEl.textContent = currentLevel + 1;
      movesEl.textContent = moves;
    }

    function move(dx, dy) {
      const newX = playerPos.x + dx;
      const newY = playerPos.y + dy;

      // 检查边界
      if (newY < 0 || newY >= grid.length || newX < 0 || newX >= grid[0].length) return;
      if (grid[newY][newX] === 1) return; // 撞墙

      const targetCell = grid[newY][newX];

      // 推箱子
      if (targetCell === 3 || targetCell === 6) {
        const pushX = newX + dx;
        const pushY = newY + dy;

        // 检查箱子能不能推
        if (pushY < 0 || pushY >= grid.length || pushX < 0 || pushX >= grid[0].length) return;
        const pushTarget = grid[pushY][pushX];
        if (pushTarget === 1 || pushTarget === 3 || pushTarget === 6) return; // 不能推

        // 保存历史
        history.push({
          playerPos: { ...playerPos },
          grid: JSON.parse(JSON.stringify(grid))
        });

        // 移动箱子
        grid[pushY][pushX] = (pushTarget === 2) ? 3 : 6;
        grid[newY][newX] = (targetCell === 6) ? 4 : 2;
      } else if (targetCell === 2 || targetCell === 4) {
        // 保存历史
        history.push({
          playerPos: { ...playerPos },
          grid: JSON.parse(JSON.stringify(grid))
        });
      } else {
        return; // 不能移动
      }

      // 移动玩家
      grid[playerPos.y][playerPos.x] = (grid[playerPos.y][playerPos.x] === 7) ? 4 : 2;
      playerPos = { x: newX, y: newY };
      grid[newY][newX] = (grid[newY][newX] === 2) ? 5 : 7;

      moves++;
      updateDisplay();
      draw();
      checkWin();
    }

    function undo() {
      if (history.length === 0) return;
      const state = history.pop();
      playerPos = state.playerPos;
      grid = state.grid;
      moves--;
      updateDisplay();
      draw();
    }

    function reset() {
      loadLevel(currentLevel);
    }

    function checkWin() {
      // 检查所有箱子是否都在目标点上
      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[y].length; x++) {
          if (grid[y][x] === 3) return; // 还有箱子不在目标点上
        }
      }

      // 通关
      gameRunning = false;

      // 保存完成记录
      if (!completedLevels.includes(currentLevel)) {
        completedLevels.push(currentLevel);
        localStorage.setItem('sokoban_completed', JSON.stringify(completedLevels));
      }

      winMoves.textContent = moves;

      // 评价
      if (moves < 20) {
        winSubText.textContent = "⭐ 神级! 再接再厉!";
      } else if (moves < 50) {
        winSubText.textContent = "👍 很棒! 继续保持!";
      } else {
        winSubText.textContent = "💪 过关就是胜利!";
      }

      if (currentLevel >= LEVELS.length - 1) {
        allWinOverlay.classList.remove('hidden');
      } else {
        winOverlay.classList.remove('hidden');
      }
    }

    // ==================== 绘制 ====================
    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[y].length; x++) {
          const cell = grid[y][x];
          const px = x * CELL_SIZE;
          const py = y * CELL_SIZE;

          switch (cell) {
            case 1: // 墙
              ctx.fillStyle = '#1a1a2e';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              ctx.strokeStyle = '#2a2a4e';
              ctx.lineWidth = 1;
              ctx.strokeRect(px + 1, py + 1, CELL_SIZE - 2, CELL_SIZE - 2);
              break;

            case 2: // 地板
              ctx.fillStyle = '#0a0a0f';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              // 网格线
              ctx.strokeStyle = 'rgba(34, 245, 255, 0.05)';
              ctx.lineWidth = 0.5;
              ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);
              break;

            case 3: // 箱子
              ctx.fillStyle = '#0a0a0f';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              drawBox(px, py, '#ff3e64', '#ff3e64');
              break;

            case 4: // 目标点
              ctx.fillStyle = '#0a0a0f';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              ctx.fillStyle = '#22ff8f';
              ctx.shadowColor = '#22ff8f';
              ctx.shadowBlur = 8;
              ctx.beginPath();
              ctx.arc(px + CELL_SIZE / 2, py + CELL_SIZE / 2, 6, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 0;
              break;

            case 5: // 玩家
              ctx.fillStyle = '#0a0a0f';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              drawPlayer(px, py);
              break;

            case 6: // 箱子在目标上
              ctx.fillStyle = '#0a0a0f';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              ctx.fillStyle = '#22ff8f';
              ctx.shadowColor = '#22ff8f';
              ctx.shadowBlur = 8;
              ctx.beginPath();
              ctx.arc(px + CELL_SIZE / 2, py + CELL_SIZE / 2, 6, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 0;
              drawBox(px, py, '#22ff8f', '#22ff8f');
              break;

            case 7: // 玩家在目标上
              ctx.fillStyle = '#0a0a0f';
              ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
              ctx.fillStyle = '#22ff8f';
              ctx.shadowColor = '#22ff8f';
              ctx.shadowBlur = 8;
              ctx.beginPath();
              ctx.arc(px + CELL_SIZE / 2, py + CELL_SIZE / 2, 6, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 0;
              drawPlayer(px, py);
              break;
          }
        }
      }
    }

    function drawBox(px, py, color, glowColor) {
      const size = CELL_SIZE - 8;
      const x = px + 4;
      const y = py + 4;

      ctx.fillStyle = color;
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 10;
      ctx.fillRect(x, y, size, size);

      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(x + 3, y + 3, size - 6, size - 6);

      ctx.fillStyle = color;
      ctx.fillRect(x + 6, y + 6, size - 12, size - 12);
    }

    function drawPlayer(px, py) {
      const cx = px + CELL_SIZE / 2;
      const cy = py + CELL_SIZE / 2;
      const r = CELL_SIZE / 2 - 6;

      // 身体
      ctx.fillStyle = '#22f5ff';
      ctx.shadowColor = '#22f5ff';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // 眼睛
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      ctx.beginPath();
      ctx.arc(cx - 4, cy - 2, 3, 0, Math.PI * 2);
      ctx.arc(cx + 4, cy - 2, 3, 0, Math.PI * 2);
      ctx.fill();

      // 微笑
      ctx.strokeStyle = '#0a0a0f';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy + 2, 5, 0.1 * Math.PI, 0.9 * Math.PI);
      ctx.stroke();
    }

    // ==================== 控制 ====================
    let gameRunning = false;

    function setupControls() {
      // 键盘
      document.addEventListener('keydown', (e) => {
        if (!startOverlay.classList.contains('hidden')) {
          if (e.key === 'Enter' || e.key === ' ') {
            startGame();
          }
          return;
        }

        if (!winOverlay.classList.contains('hidden') || !allWinOverlay.classList.contains('hidden')) {
          return;
        }

        switch (e.key) {
          case 'ArrowUp':
          case 'w':
          case 'W':
            e.preventDefault();
            move(0, -1);
            break;
          case 'ArrowDown':
          case 's':
          case 'S':
            e.preventDefault();
            move(0, 1);
            break;
          case 'ArrowLeft':
          case 'a':
          case 'A':
            e.preventDefault();
            move(-1, 0);
            break;
          case 'ArrowRight':
          case 'd':
          case 'D':
            e.preventDefault();
            move(1, 0);
            break;
          case 'z':
          case 'Z':
            undo();
            break;
          case 'r':
          case 'R':
            reset();
            break;
        }
      });

      // 触摸控制
      document.querySelectorAll('.ctrl-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const dir = btn.dataset.dir;
          switch (dir) {
            case 'up': move(0, -1); break;
            case 'down': move(0, 1); break;
            case 'left': move(-1, 0); break;
            case 'right': move(1, 0); break;
          }
        });
      });

      // 滑动控制
      let touchStartX, touchStartY;
      canvas.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      canvas.addEventListener('touchend', (e) => {
        if (!touchStartX || !touchStartY) return;

        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const dx = touchEndX - touchStartX;
        const dy = touchEndY - touchStartY;

        const minSwipe = 30;
        if (Math.abs(dx) > Math.abs(dy)) {
          if (Math.abs(dx) > minSwipe) {
            move(dx > 0 ? 1 : -1, 0);
          }
        } else {
          if (Math.abs(dy) > minSwipe) {
            move(0, dy > 0 ? 1 : -1);
          }
        }

        touchStartX = null;
        touchStartY = null;
      }, { passive: true });

      // 按钮事件
      document.getElementById('continueBtn').addEventListener('click', startGame);
      document.getElementById('selectLevelBtn').addEventListener('click', showLevelSelect);
      document.getElementById('backToStartBtn').addEventListener('click', () => {
        levelSelectOverlay.classList.add('hidden');
        startOverlay.classList.remove('hidden');
      });
      document.getElementById('nextLevelBtn').addEventListener('click', () => {
        winOverlay.classList.add('hidden');
        loadLevel(currentLevel + 1);
      });
      document.getElementById('replayBtn').addEventListener('click', () => {
        winOverlay.classList.add('hidden');
        reset();
      });
      document.getElementById('restartAllBtn').addEventListener('click', () => {
        allWinOverlay.classList.add('hidden');
        loadLevel(0);
      });
      document.getElementById('selectLevelEndBtn').addEventListener('click', () => {
        allWinOverlay.classList.add('hidden');
        showLevelSelect();
      });
      document.getElementById('undoBtn').addEventListener('click', undo);
      document.getElementById('resetBtn').addEventListener('click', reset);
      document.getElementById('menuBtn').addEventListener('click', () => {
        startOverlay.classList.remove('hidden');
      });
      document.getElementById('prevLevelBtn').addEventListener('click', () => {
        if (currentLevel > 0) {
          loadLevel(currentLevel - 1);
        }
      });
      document.getElementById('nextNavBtn').addEventListener('click', () => {
        if (currentLevel < LEVELS.length - 1) {
          loadLevel(currentLevel + 1);
        }
      });
    }

    function startGame() {
      startOverlay.classList.add('hidden');
      gameRunning = true;
    }

    function showLevelSelect() {
      levelSelect.innerHTML = '';
      for (let i = 0; i < LEVELS.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.textContent = i + 1;
        if (completedLevels.includes(i)) {
          btn.classList.add('completed');
        }
        if (i === currentLevel) {
          btn.classList.add('current');
        }
        btn.addEventListener('click', () => {
          levelSelectOverlay.classList.add('hidden');
          loadLevel(i);
          gameRunning = true;
        });
        levelSelect.appendChild(btn);
      }
      levelSelectOverlay.classList.remove('hidden');
    }

    // 初始化
    loadLevel(0);
    setupControls();

    // 窗口大小改变时重新调整画布
    window.addEventListener('resize', resizeCanvas);
  </script>
</body>
</html>
