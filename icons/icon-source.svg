<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a18"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22f5ff"/>
      <stop offset="50%" style="stop-color:#ff3ea5"/>
      <stop offset="100%" style="stop-color:#c26bff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- 外发光边框 -->
  <rect x="20" y="20" width="472" height="472" rx="60" fill="none" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)"/>

  <!-- 游戏手柄图标 -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- 手柄主体 -->
    <rect x="-120" y="-60" width="240" height="120" rx="40" fill="none" stroke="#22f5ff" stroke-width="8"/>

    <!-- 左摇杆 -->
    <circle cx="-60" cy="0" r="25" fill="#22f5ff"/>
    <circle cx="-60" cy="0" r="12" fill="#0a0a18"/>

    <!-- AB按钮 -->
    <circle cx="40" cy="-15" r="18" fill="#ff3ea5"/>
    <circle cx="70" cy="15" r="18" fill="#ffec42"/>

    <!-- 顶部按键 -->
    <rect x="-30" y="-70" width="20" height="12" rx="4" fill="#c26bff"/>
    <rect x="10" y="-70" width="20" height="12" rx="4" fill="#22ff8f"/>
  </g>

  <!-- 角落装饰 -->
  <circle cx="60" cy="60" r="8" fill="#22f5ff" opacity="0.6"/>
  <circle cx="452" cy="60" r="8" fill="#ff3ea5" opacity="0.6"/>
  <circle cx="60" cy="452" r="8" fill="#c26bff" opacity="0.6"/>
  <circle cx="452" cy="452" r="8" fill="#ffec42" opacity="0.6"/>
</svg>
