<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>霓虹街机 · Neon Arcade</title>
<meta name="description" content="俄罗斯方块、2048、舒尔特、数独、扫雷、贪吃蛇 - 复古霓虹风格的街机游戏合集" />
<meta name="theme-color" content="#0a0a18" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="霓虹街机" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css?v=6" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Orbitron", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .home-page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 16px;
    gap: 24px;
    background:
      radial-gradient(ellipse 100% 50% at 50% 0%, rgba(34, 245, 255, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(194, 107, 255, 0.12) 0%, transparent 50%),
      linear-gradient(180deg, #12184a 0%, #080c30 40%, #040620 80%, #020314 100%);
  }

  /* 霓虹招牌 */
  .arcade-sign {
    text-align: center;
    position: relative;
  }

  .arcade-sign h1 {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1;
    margin: 0;
    color: #fff;
  }

  .arcade-sign .neon-cyan {
    color: var(--neon-cyan);
    animation: signGlow 2s ease-in-out infinite;
  }

  .arcade-sign .neon-pink {
    color: var(--neon-pink);
    animation: signGlow 2s ease-in-out infinite 1s;
  }

  @keyframes signGlow {
    0%, 100% {
      text-shadow:
        0 0 4px currentColor,
        0 0 12px currentColor,
        0 0 24px currentColor,
        0 0 40px currentColor;
      opacity: 0.85;
    }
    50% {
      text-shadow:
        0 0 8px currentColor,
        0 0 20px currentColor,
        0 0 40px currentColor,
        0 0 60px currentColor;
      opacity: 1;
    }
  }

  .arcade-sign .sign-sub {
    margin-top: 8px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 6px;
  }

  /* 机台区域 */
  .arcade-floor {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 900px;
    flex: 1;
    padding-bottom: 8px;
  }

  /* 街机机台 */
  .arcade-machine {
    position: relative;
    display: flex;
    flex-direction: column;
    width: 140px;
    height: 380px;
    text-decoration: none;
    color: var(--text);
    border-radius: 16px 16px 8px 8px;
    background: linear-gradient(180deg, #1e2448 0%, #151a38 30%, #0d1130 70%, #080c24 100%);
    box-shadow:
      0 20px 0 #040614,
      0 22px 0 #06081c,
      0 24px 40px rgba(0, 0, 0, 0.7),
      inset 0 2px 0 rgba(255, 255, 255, 0.08);
    transition: all 0.15s ease;
    overflow: hidden;
  }

  .arcade-machine::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px 16px 8px 8px;
    border: 2px solid rgba(255, 255, 255, 0.08);
    pointer-events: none;
    z-index: 2;
  }

  /* 机台顶部灯条 */
  .machine-top {
    height: 8px;
    border-radius: 16px 16px 0 0;
    position: relative;
    overflow: hidden;
  }

  .machine-top::after {
    content: "";
    position: absolute;
    inset: 0;
    animation: topLight 1.5s ease-in-out infinite;
  }

  @keyframes topLight {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .arcade-machine.tetris .machine-top { background: rgba(0, 245, 255, 0.6); box-shadow: 0 0 12px rgba(0, 245, 255, 0.4); }
  .arcade-machine.tetris .machine-top::after { background: rgba(0, 245, 255, 0.4); }
  .arcade-machine.g2048 .machine-top { background: rgba(255, 92, 176, 0.6); box-shadow: 0 0 12px rgba(255, 92, 176, 0.4); }
  .arcade-machine.g2048 .machine-top::after { background: rgba(255, 92, 176, 0.4); }
  .arcade-machine.schulte .machine-top { background: rgba(255, 224, 102, 0.6); box-shadow: 0 0 12px rgba(255, 224, 102, 0.4); }
  .arcade-machine.schulte .machine-top::after { background: rgba(255, 224, 102, 0.4); }
  .arcade-machine.sudoku .machine-top { background: rgba(64, 255, 159, 0.6); box-shadow: 0 0 12px rgba(64, 255, 159, 0.4); }
  .arcade-machine.sudoku .machine-top::after { background: rgba(64, 255, 159, 0.4); }
  .arcade-machine.minesweeper .machine-top { background: rgba(208, 112, 255, 0.6); box-shadow: 0 0 12px rgba(208, 112, 255, 0.4); }
.arcade-machine.minesweeper .machine-top::after { background: rgba(208, 112, 255, 0.4); }
.arcade-machine.snake .machine-top { background: rgba(255, 140, 66, 0.6); box-shadow: 0 0 12px rgba(255, 140, 66, 0.4); }
.arcade-machine.snake .machine-top::after { background: rgba(255, 140, 66, 0.4); }

  /* 机台屏幕 */
  .machine-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 10px;
    border-radius: 10px;
    background:
      radial-gradient(ellipse at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%),
      linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.1) 100%);
    box-shadow:
      inset 0 2px 8px rgba(0, 0, 0, 0.5),
      inset 0 -1px 2px rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    position: relative;
  }

  .machine-screen::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 30%;
    border-radius: 10px 10px 50% 50%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .machine-icon {
    font-size: 44px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
  }

  .machine-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
    writing-mode: horizontal-tb;
  }

  .arcade-machine.tetris .machine-icon { color: #00f5ff; text-shadow: 0 0 16px rgba(0, 245, 255, 0.7); }
.arcade-machine.g2048 .machine-icon { color: #ff5cb0; text-shadow: 0 0 16px rgba(255, 92, 176, 0.7); }
.arcade-machine.schulte .machine-icon { color: #ffe066; text-shadow: 0 0 16px rgba(255, 224, 102, 0.7); }
.arcade-machine.sudoku .machine-icon { color: #40ff9f; text-shadow: 0 0 16px rgba(64, 255, 159, 0.7); }
.arcade-machine.minesweeper .machine-icon { color: #d070ff; text-shadow: 0 0 16px rgba(208, 112, 255, 0.7); }
.arcade-machine.snake .machine-icon { color: #ff8c42; text-shadow: 0 0 16px rgba(255, 140, 66, 0.7); }

  /* 机台底部控制面板 */
  .machine-panel {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 12px;
    background: linear-gradient(180deg, #0a0e28 0%, #06081c 100%);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 0 0 8px 8px;
  }

  .panel-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(145deg, #2a3055, #1a2040);
    box-shadow:
      0 3px 0 #080a18,
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .panel-stick {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #3a4060, #1a2040);
    box-shadow:
      0 3px 0 #080a18,
      inset 0 2px 4px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
  }

  .panel-stick::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
  }

  /* 机台hover效果 */
  .arcade-machine:hover {
    transform: translateY(-6px);
    box-shadow:
      0 26px 0 #040614,
      0 28px 0 #06081c,
      0 30px 50px rgba(0, 0, 0, 0.6),
      inset 0 2px 0 rgba(255, 255, 255, 0.1);
  }

  .arcade-machine:hover .machine-screen {
    box-shadow:
      inset 0 2px 8px rgba(0, 0, 0, 0.4),
      inset 0 -1px 2px rgba(255, 255, 255, 0.05),
      0 0 20px rgba(255, 255, 255, 0.05);
  }

  .arcade-machine:active {
    transform: translateY(-2px);
    box-shadow:
      0 22px 0 #040614,
      0 24px 0 #06081c,
      0 26px 40px rgba(0, 0, 0, 0.6);
  }

  /* 地板光效 */
  .floor-glow {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 800px;
    height: 60px;
    background: radial-gradient(ellipse at center, rgba(34, 245, 255, 0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* 底部 */
  .home-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.6;
  }

  .sound-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--neon-cyan);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow:
      0 2px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .sound-btn:hover {
    background: rgba(34, 245, 255, 0.1);
  }

  .sound-btn:active {
    transform: translateY(2px);
  }

  /* 移动端 */
  @media (max-width: 768px) {
    .home-page {
      padding: 16px 12px 12px;
      gap: 16px;
    }
    .arcade-sign h1 {
      letter-spacing: 4px;
      font-size: clamp(24px, 10vw, 36px);
    }
    .arcade-sign .sign-sub {
      font-size: 10px;
      letter-spacing: 3px;
    }
    .arcade-floor {
      gap: 8px;
      flex-wrap: wrap;
      align-content: flex-end;
      padding-bottom: 4px;
    }
    .arcade-machine {
      width: calc(33.33% - 6px);
      min-width: 90px;
      max-width: 120px;
      height: 280px;
    }
    .machine-icon {
      font-size: 32px;
    }
    .machine-name {
      font-size: 11px;
      letter-spacing: 1px;
    }
    .machine-panel {
      height: 44px;
    }
    .panel-btn {
      width: 20px;
      height: 20px;
    }
    .panel-stick {
      width: 24px;
      height: 24px;
    }
  }

  @media (max-width: 360px) {
    .arcade-machine {
      width: calc(50% - 4px);
      height: 240px;
    }
    .machine-icon {
      font-size: 28px;
    }
    .machine-name {
      font-size: 10px;
    }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="home-page">
    <div class="arcade-sign">
      <h1>
        <span class="neon-cyan">霓</span><span class="neon-pink">虹</span>街机
      </h1>
      <p class="sign-sub">NEON ARCADE · 2099</p>
    </div>

    <div class="arcade-floor">
      <div class="floor-glow"></div>

      <a href="tetris.html" class="arcade-machine tetris">
        <div class="machine-top"></div>
        <div class="machine-screen">
          <div class="machine-icon">▣</div>
          <div class="machine-name">俄罗斯方块</div>
        </div>
        <div class="machine-panel">
          <div class="panel-stick"></div>
          <div class="panel-btn"></div>
          <div class="panel-btn"></div>
        </div>
      </a>

      <a href="g2048.html" class="arcade-machine g2048">
        <div class="machine-top"></div>
        <div class="machine-screen">
          <div class="machine-icon">✦</div>
          <div class="machine-name">2048</div>
        </div>
        <div class="machine-panel">
          <div class="panel-stick"></div>
          <div class="panel-btn"></div>
          <div class="panel-btn"></div>
        </div>
      </a>

      <a href="schulte.html" class="arcade-machine schulte">
        <div class="machine-top"></div>
        <div class="machine-screen">
          <div class="machine-icon">△</div>
          <div class="machine-name">舒尔特</div>
        </div>
        <div class="machine-panel">
          <div class="panel-stick"></div>
          <div class="panel-btn"></div>
          <div class="panel-btn"></div>
        </div>
      </a>

      <a href="sudoku.html" class="arcade-machine sudoku">
        <div class="machine-top"></div>
        <div class="machine-screen">
          <div class="machine-icon">#</div>
          <div class="machine-name">数独</div>
        </div>
        <div class="machine-panel">
          <div class="panel-stick"></div>
          <div class="panel-btn"></div>
          <div class="panel-btn"></div>
        </div>
      </a>

      <a href="minesweeper.html" class="arcade-machine minesweeper">
        <div class="machine-top"></div>
        <div class="machine-screen">
          <div class="machine-icon">◈</div>
          <div class="machine-name">扫雷</div>
        </div>
        <div class="machine-panel">
          <div class="panel-stick"></div>
          <div class="panel-btn"></div>
          <div class="panel-btn"></div>
        </div>
      </a>

      <a href="snake.html" class="arcade-machine snake">
        <div class="machine-top"></div>
        <div class="machine-screen">
          <div class="machine-icon">◍</div>
          <div class="machine-name">贪吃蛇</div>
        </div>
        <div class="machine-panel">
          <div class="panel-stick"></div>
          <div class="panel-btn"></div>
          <div class="panel-btn"></div>
        </div>
      </a>
    </div>

    <div class="home-footer">
      <button class="sound-btn" id="home-sound-btn" title="背景音乐">
        <span id="sound-icon">🔊</span>
      </button>
      <span>选择一个机台开始游戏</span>
    </div>
  </div>

  <script>
    (function() {
      const soundBtn = document.getElementById('home-sound-btn');
      const soundIcon = document.getElementById('sound-icon');
      let isMuted = true;
      let audioCtx = null;
      let gainNode = null;
      let rhythmStep = 0;

      try {
        isMuted = localStorage.getItem('home_bgm_muted') !== 'false';
      } catch(e) {}

      function updateSoundBtn() {
        soundIcon.textContent = isMuted ? '🔇' : '🔊';
      }

      function playKick() {
        if (!audioCtx || !gainNode || isMuted) return;
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
        oscGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.connect(oscGain);
        oscGain.connect(gainNode);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      }

      function playSnare() {
        if (!audioCtx || !gainNode || isMuted) return;
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(250, audioCtx.currentTime);
        oscGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(oscGain);
        oscGain.connect(gainNode);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }

      function playHiHat() {
        if (!audioCtx || !gainNode || isMuted) return;
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(8000, audioCtx.currentTime);
        oscGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(oscGain);
        oscGain.connect(gainNode);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
      }

      function playMelodyNote(freq) {
        if (!audioCtx || !gainNode || isMuted) return;
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        oscGain.gain.setValueAtTime(0, audioCtx.currentTime);
        oscGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(oscGain);
        oscGain.connect(gainNode);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.35);
      }

      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          gainNode = audioCtx.createGain();
          gainNode.gain.value = 0.3;
          gainNode.connect(audioCtx.destination);

          const melody = [
            329.63, 392, 440, 523.25,
            493.88, 440, 392, 329.63,
            392, 440, 493.88, 523.25,
            493.88, 440, 392, 329.63
          ];
          let melodyIndex = 0;

          function playBeat() {
            if (!audioCtx) return;

            if (!isMuted && audioCtx.state === 'running') {
              if (rhythmStep % 4 === 0) playKick();
              if (rhythmStep % 4 === 2) playSnare();
              playHiHat();

              if (rhythmStep % 2 === 0) {
                playMelodyNote(melody[melodyIndex]);
                melodyIndex = (melodyIndex + 1) % melody.length;
              }
            }

            rhythmStep++;
            setTimeout(playBeat, 125);
          }

          playBeat();
        } catch(e) {}
      }

      updateSoundBtn();

      soundBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        isMuted = !isMuted;
        updateSoundBtn();
        try {
          localStorage.setItem('home_bgm_muted', String(isMuted));
        } catch(e) {}
        if (!isMuted) {
          initAudio();
          if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
        }
      });

      if (!isMuted) {
        initAudio();
      }
    })();
  </script>

  <!-- PWA Service Worker 注册 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('SW 注册成功:', registration.scope);
          })
          .catch((error) => {
            console.log('SW 注册失败:', error);
          });
      });
    }
  </script>
</body>
</html>
