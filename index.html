<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>霓虹街机 · Neon Arcade</title>
<link rel="stylesheet" href="style.css?v=6" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Orbitron", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .home-page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    gap: 18px;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(34, 245, 255, 0.22) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 70%, rgba(194, 107, 255, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(255, 62, 165, 0.1) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(34, 255, 143, 0.08) 0%, transparent 60%),
      linear-gradient(180deg, #151a50 0%, #0a0e35 35%, #05071e 70%, #030415 100%);
  }

  .home-title {
    text-align: center;
  }

  .home-title h1 {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1.1;
    margin: 0;
  }

  .home-title .title-cn {
    color: #fff;
  }

  .home-title .title-cn .neon-cyan {
    color: var(--neon-cyan);
    animation: breathe-cyan 2s ease-in-out infinite;
  }

  .home-title .title-cn .neon-pink {
    color: var(--neon-pink);
    animation: breathe-pink 2s ease-in-out infinite 1s;
  }

  @keyframes breathe-cyan {
    0%, 100% {
      text-shadow:
        0 0 4px rgba(34, 245, 255, 0.7),
        0 0 10px rgba(34, 245, 255, 0.4),
        0 0 18px rgba(34, 245, 255, 0.2);
    }
    50% {
      text-shadow:
        0 0 8px rgba(34, 245, 255, 0.9),
        0 0 18px rgba(34, 245, 255, 0.6),
        0 0 32px rgba(34, 245, 255, 0.35),
        0 0 50px rgba(34, 245, 255, 0.2);
    }
  }

  @keyframes breathe-pink {
    0%, 100% {
      text-shadow:
        0 0 4px rgba(255, 62, 165, 0.7),
        0 0 10px rgba(255, 62, 165, 0.4),
        0 0 18px rgba(255, 62, 165, 0.2);
    }
    50% {
      text-shadow:
        0 0 8px rgba(255, 62, 165, 0.9),
        0 0 18px rgba(255, 62, 165, 0.6),
        0 0 32px rgba(255, 62, 165, 0.35),
        0 0 50px rgba(255, 62, 165, 0.2);
    }
  }

  .home-subtitle {
    margin-top: 10px;
    color: var(--text-dim);
    letter-spacing: 4px;
    font-size: 12px;
    font-weight: 400;
  }

  .game-grid-wrap {
    position: relative;
    padding: 20px;
    border-radius: 22px;
    width: 100%;
    max-width: 580px;
    background:
      linear-gradient(180deg, rgba(34, 245, 255, 0.18), rgba(194, 107, 255, 0.15));
    box-shadow:
      0 0 0 2px rgba(34, 245, 255, 0.5) inset,
      0 0 60px rgba(34, 245, 255, 0.3),
      0 0 120px rgba(194, 107, 255, 0.2);
  }

  .game-grid-wrap::before {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 22px;
    background: linear-gradient(135deg,
      rgba(34, 245, 255, 0.8),
      rgba(194, 107, 255, 0.8),
      rgba(255, 62, 165, 0.8),
      rgba(34, 245, 255, 0.8));
    filter: blur(12px);
    opacity: 0.5;
    z-index: -1;
  }

  .game-grid-wrap::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 22px;
    background: linear-gradient(135deg,
      rgba(34, 245, 255, 0.8),
      rgba(194, 107, 255, 0.8),
      rgba(255, 62, 165, 0.8),
      rgba(34, 245, 255, 0.8));
    filter: blur(12px);
    opacity: 0.5;
    z-index: -2;
    animation: borderFlow 6s linear infinite;
  }

  @keyframes borderFlow {
    0% { filter: blur(12px) hue-rotate(0deg); }
    100% { filter: blur(12px) hue-rotate(360deg); }
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    width: 100%;
  }

  .game-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 16px;
    text-decoration: none;
    color: var(--text);
    border: none;
    cursor: pointer;
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
    border-radius: 20px;
    background: linear-gradient(180deg, #303560 0%, #1c2045 50%, #10142e 100%);
    box-shadow:
      0 10px 0 #05070f,
      0 12px 0 #080a18,
      0 16px 40px rgba(0, 0, 0, 0.6),
      inset 0 4px 0 rgba(255, 255, 255, 0.08),
      inset 0 -5px 0 rgba(0, 0, 0, 0.4);
    transition: all 0.08s ease;
    overflow: hidden;
  }

  .game-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.12);
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 55%);
    pointer-events: none;
  }

  .game-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 45%;
    border-radius: 20px 20px 40% 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    pointer-events: none;
  }

  .game-btn:hover {
    transform: translateY(4px);
    box-shadow:
      0 6px 0 #05070f,
      0 8px 0 #080a18,
      0 10px 28px rgba(0, 0, 0, 0.5),
      inset 0 3px 0 rgba(255, 255, 255, 0.06),
      inset 0 -4px 0 rgba(0, 0, 0, 0.3);
  }

  .game-btn:active {
    transform: translateY(10px);
    box-shadow:
      0 0 0 #05070f,
      0 4px 12px rgba(0, 0, 0, 0.4),
      inset 0 6px 12px rgba(0, 0, 0, 0.5),
      inset 0 -2px 0 rgba(255, 255, 255, 0.02);
  }

  .game-btn-icon {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4)) brightness(1.15);
  }

  .game-btn-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 3px 8px rgba(0, 0, 0, 0.7);
  }

  .game-btn.tetris .game-btn-icon { color: #00f5ff; text-shadow: 0 0 20px rgba(0,245,255,0.8), 0 0 40px rgba(0,245,255,0.4); }
  .game-btn.g2048 .game-btn-icon { color: #ff5cb0; text-shadow: 0 0 20px rgba(255,92,176,0.8), 0 0 40px rgba(255,92,176,0.4); }
  .game-btn.schulte .game-btn-icon { color: #ffe066; text-shadow: 0 0 20px rgba(255,224,102,0.8), 0 0 40px rgba(255,224,102,0.4); }
  .game-btn.sudoku .game-btn-icon { color: #40ff9f; text-shadow: 0 0 20px rgba(64,255,159,0.8), 0 0 40px rgba(64,255,159,0.4); }
  .game-btn.minesweeper .game-btn-icon { color: #d070ff; text-shadow: 0 0 20px rgba(208,112,255,0.8), 0 0 40px rgba(208,112,255,0.4); }

  .home-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.7;
  }

  .sound-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--neon-cyan);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow:
      0 2px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .sound-btn:hover {
    background: rgba(34, 245, 255, 0.1);
    box-shadow:
      0 1px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05),
      0 0 10px rgba(34, 245, 255, 0.3);
  }

  .sound-btn:active {
    transform: translateY(2px);
    box-shadow:
      0 0 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .sound-btn span {
    line-height: 1;
  }

  @media (max-width: 480px) {
    .home-page {
      gap: 14px;
      padding: 8px 12px;
    }
    .home-title h1 {
      letter-spacing: 3px;
      font-size: clamp(36px, 12vw, 48px);
    }
    .home-subtitle {
      font-size: 11px;
      letter-spacing: 2px;
    }
    .game-grid-wrap {
      padding: 14px;
      border-radius: 18px;
    }
    .game-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .game-btn {
      padding: 22px 12px;
      gap: 10px;
      font-size: 15px;
      border-radius: 16px;
      box-shadow:
        0 7px 0 #05070f,
        0 9px 0 #080a18,
        0 12px 28px rgba(0, 0, 0, 0.5),
        inset 0 3px 0 rgba(255, 255, 255, 0.07),
        inset 0 -4px 0 rgba(0, 0, 0, 0.35);
    }
    .game-btn:hover {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 #05070f,
        0 6px 0 #080a18,
        0 8px 18px rgba(0, 0, 0, 0.4),
        inset 0 2px 0 rgba(255, 255, 255, 0.05),
        inset 0 -3px 0 rgba(0, 0, 0, 0.25);
    }
    .game-btn:active {
      transform: translateY(7px);
      box-shadow:
        0 0 0 #05070f,
        0 2px 8px rgba(0, 0, 0, 0.35),
        inset 0 4px 8px rgba(0, 0, 0, 0.45);
    }
    .game-btn-icon {
      font-size: 40px;
    }
    .game-btn-name {
      font-size: 14px;
    }
    .home-footer {
      font-size: 10px;
      letter-spacing: 2px;
    }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="home-page">
    <div class="home-title">
      <h1 class="title-cn">
        <span class="neon-cyan">霓</span><span class="neon-pink">虹</span>街机
      </h1>
      <p class="home-subtitle">— 选择游戏 开始挑战 —</p>
    </div>

    <div class="game-grid-wrap">
      <div class="game-grid">
        <a href="tetris.html" class="game-btn tetris">
          <div class="game-btn-icon">▣</div>
          <div class="game-btn-name">俄罗斯方块</div>
        </a>

        <a href="g2048.html" class="game-btn g2048">
          <div class="game-btn-icon">✦</div>
          <div class="game-btn-name">2048 合成</div>
        </a>

        <a href="schulte.html" class="game-btn schulte">
          <div class="game-btn-icon">△</div>
          <div class="game-btn-name">舒尔特</div>
        </a>

        <a href="sudoku.html" class="game-btn sudoku">
          <div class="game-btn-icon">#</div>
          <div class="game-btn-name">数独</div>
        </a>

        <a href="minesweeper.html" class="game-btn minesweeper">
          <div class="game-btn-icon">◈</div>
          <div class="game-btn-name">扫雷</div>
        </a>
      </div>
    </div>

    <div class="home-footer">
      <button class="sound-btn" id="home-sound-btn" title="背景音乐">
        <span id="sound-icon">🔊</span>
      </button>
      NEON ARCADE · 2099
    </div>
  </div>

  <script>
    (function() {
      const soundBtn = document.getElementById('home-sound-btn');
      const soundIcon = document.getElementById('sound-icon');
      let isMuted = true;
      let audioCtx = null;
      let gainNode = null;
      let isPlaying = false;

      try {
        isMuted = localStorage.getItem('home_bgm_muted') !== 'false';
      } catch(e) {}

      function updateSoundBtn() {
        soundIcon.textContent = isMuted ? '🔇' : '🔊';
      }

      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          gainNode = audioCtx.createGain();
          gainNode.gain.value = 0.04;
          gainNode.connect(audioCtx.destination);

          // C大调柔和琶音循环
          const notes = [261.63, 329.63, 392, 523.25, 392, 329.63];
          let step = 0;

          function playNote() {
            if (!audioCtx || !gainNode) return;

            if (!isMuted && audioCtx.state === 'running') {
              const osc = audioCtx.createOscillator();
              const oscGain = audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.value = notes[step];
              oscGain.gain.setValueAtTime(0, audioCtx.currentTime);
              oscGain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.08);
              oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.65);
              osc.connect(oscGain);
              oscGain.connect(gainNode);
              osc.start();
              osc.stop(audioCtx.currentTime + 0.7);
            }

            step = (step + 1) % notes.length;
            setTimeout(playNote, 650);
          }

          playNote();
          isPlaying = true;
        } catch(e) {}
      }

      updateSoundBtn();

      soundBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        isMuted = !isMuted;
        updateSoundBtn();
        try {
          localStorage.setItem('home_bgm_muted', String(isMuted));
        } catch(e) {}
        if (!isMuted) {
          initAudio();
          if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
        }
      });

      if (!isMuted) {
        initAudio();
      }
    })();
  </script>
</body>
</html>
