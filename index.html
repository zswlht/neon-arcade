<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>霓虹街机 · Neon Arcade</title>
<link rel="stylesheet" href="style.css?v=6" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Orbitron", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .home-page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 24px;
  }

  .home-title {
    text-align: center;
  }

  .home-title h1 {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1.1;
    margin: 0;
  }

  .home-title .title-cn {
    color: #fff;
  }

  .home-title .title-cn .neon-cyan {
    color: var(--neon-cyan);
    animation: breathe-cyan 2s ease-in-out infinite;
  }

  .home-title .title-cn .neon-pink {
    color: var(--neon-pink);
    animation: breathe-pink 2s ease-in-out infinite 1s;
  }

  @keyframes breathe-cyan {
    0%, 100% {
      text-shadow:
        0 0 8px rgba(34, 245, 255, 0.9),
        0 0 24px rgba(34, 245, 255, 0.6),
        0 0 48px rgba(34, 245, 255, 0.4);
      filter: brightness(1);
    }
    50% {
      text-shadow:
        0 0 16px rgba(34, 245, 255, 1),
        0 0 40px rgba(34, 245, 255, 0.8),
        0 0 80px rgba(34, 245, 255, 0.6);
      filter: brightness(1.3);
    }
  }

  @keyframes breathe-pink {
    0%, 100% {
      text-shadow:
        0 0 8px rgba(255, 62, 165, 0.9),
        0 0 24px rgba(255, 62, 165, 0.6),
        0 0 48px rgba(255, 62, 165, 0.4);
      filter: brightness(1);
    }
    50% {
      text-shadow:
        0 0 16px rgba(255, 62, 165, 1),
        0 0 40px rgba(255, 62, 165, 0.8),
        0 0 80px rgba(255, 62, 165, 0.6);
      filter: brightness(1.3);
    }
  }

  .home-subtitle {
    margin-top: 10px;
    color: var(--text-dim);
    letter-spacing: 4px;
    font-size: 12px;
    font-weight: 400;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 600px;
    width: 100%;
  }

  .game-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 22px 14px;
    text-decoration: none;
    color: var(--text);
    border: none;
    cursor: pointer;
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    border-radius: 18px;
    background: linear-gradient(180deg, #252a4a 0%, #151a35 50%, #0c1025 100%);
    box-shadow:
      0 8px 0 #060810,
      0 10px 0 #0a0d18,
      0 12px 30px rgba(0, 0, 0, 0.6),
      inset 0 3px 0 rgba(255, 255, 255, 0.08),
      inset 0 -3px 0 rgba(0, 0, 0, 0.4);
    transition: all 0.1s ease;
    overflow: hidden;
  }

  .game-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .game-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    border-radius: 18px 18px 50% 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .game-btn:hover {
    transform: translateY(3px);
    box-shadow:
      0 5px 0 #060810,
      0 7px 0 #0a0d18,
      0 9px 24px rgba(0, 0, 0, 0.5),
      inset 0 3px 0 rgba(255, 255, 255, 0.06),
      inset 0 -3px 0 rgba(0, 0, 0, 0.3);
  }

  .game-btn:active {
    transform: translateY(8px);
    box-shadow:
      0 0 0 #060810,
      0 2px 8px rgba(0, 0, 0, 0.4),
      inset 0 4px 8px rgba(0, 0, 0, 0.5),
      inset 0 -2px 0 rgba(255, 255, 255, 0.02);
  }

  .game-btn-icon {
    font-size: 36px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4)) brightness(1.1);
  }

  .game-btn-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
  }

  .game-btn.tetris .game-btn-icon { color: #00f5ff; text-shadow: 0 0 20px rgba(0,245,255,0.8), 0 0 40px rgba(0,245,255,0.4); }
  .game-btn.g2048 .game-btn-icon { color: #ff5cb0; text-shadow: 0 0 20px rgba(255,92,176,0.8), 0 0 40px rgba(255,92,176,0.4); }
  .game-btn.schulte .game-btn-icon { color: #ffe066; text-shadow: 0 0 20px rgba(255,224,102,0.8), 0 0 40px rgba(255,224,102,0.4); }
  .game-btn.sudoku .game-btn-icon { color: #40ff9f; text-shadow: 0 0 20px rgba(64,255,159,0.8), 0 0 40px rgba(64,255,159,0.4); }
  .game-btn.minesweeper .game-btn-icon { color: #d070ff; text-shadow: 0 0 20px rgba(208,112,255,0.8), 0 0 40px rgba(208,112,255,0.4); }

  .home-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.7;
  }

  .sound-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--neon-cyan);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow:
      0 2px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .sound-btn:hover {
    background: rgba(34, 245, 255, 0.1);
    box-shadow:
      0 1px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05),
      0 0 10px rgba(34, 245, 255, 0.3);
  }

  .sound-btn:active {
    transform: translateY(2px);
    box-shadow:
      0 0 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .sound-btn span {
    line-height: 1;
  }

  @media (max-width: 480px) {
    .home-page {
      gap: 20px;
      padding: 16px 12px;
    }
    .home-title h1 {
      letter-spacing: 4px;
    }
    .home-subtitle {
      font-size: 10px;
      letter-spacing: 2px;
    }
    .game-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .game-btn {
      padding: 16px 10px;
      gap: 6px;
      font-size: 13px;
    }
    .game-btn-icon {
      font-size: 30px;
    }
    .game-btn-name {
      font-size: 12px;
    }
    .home-footer {
      font-size: 10px;
      letter-spacing: 2px;
    }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="home-page">
    <div class="home-title">
      <h1 class="title-cn">
        <span class="neon-cyan">霓</span><span class="neon-pink">虹</span>街机
      </h1>
      <p class="home-subtitle">— 选择游戏 开始挑战 —</p>
    </div>

    <div class="game-grid">
      <a href="tetris.html" class="game-btn tetris">
        <div class="game-btn-icon">▣</div>
        <div class="game-btn-name">俄罗斯方块</div>
      </a>

      <a href="g2048.html" class="game-btn g2048">
        <div class="game-btn-icon">✦</div>
        <div class="game-btn-name">2048 合成</div>
      </a>

      <a href="schulte.html" class="game-btn schulte">
        <div class="game-btn-icon">△</div>
        <div class="game-btn-name">舒尔特</div>
      </a>

      <a href="sudoku.html" class="game-btn sudoku">
        <div class="game-btn-icon">#</div>
        <div class="game-btn-name">数独</div>
      </a>

      <a href="minesweeper.html" class="game-btn minesweeper">
        <div class="game-btn-icon">◈</div>
        <div class="game-btn-name">扫雷</div>
      </a>
    </div>

    <div class="home-footer">
      <button class="sound-btn" id="home-sound-btn" title="背景音乐">
        <span id="sound-icon">🔊</span>
      </button>
      NEON ARCADE · 2099
    </div>
  </div>

  <audio id="home-bgm" loop preload="auto">
    <source src="https://assets.mixkit.co/music/preview/mixkit-game-show-looby-loo-678.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      const bgm = document.getElementById('home-bgm');
      const soundBtn = document.getElementById('home-sound-btn');
      const soundIcon = document.getElementById('sound-icon');
      let isMuted = true;

      // 从 localStorage 读取状态
      try {
        isMuted = localStorage.getItem('home_bgm_muted') !== 'false';
      } catch(e) {}

      function updateSoundBtn() {
        soundIcon.textContent = isMuted ? '🔇' : '🔊';
        bgm.muted = isMuted;
      }

      updateSoundBtn();

      soundBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        isMuted = !isMuted;
        updateSoundBtn();
        try {
          localStorage.setItem('home_bgm_muted', String(isMuted));
        } catch(e) {}
        if (!isMuted && bgm.paused) {
          bgm.play().catch(function() {});
        }
      });

      // 如果不是静音，则尝试播放
      if (!isMuted) {
        bgm.play().catch(function() {});
      }
    })();
  </script>
</body>
</html>
