<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NEON ARCADE · 霓虹街机</title>
<link rel="stylesheet" href="style.css?v=6" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  .home-page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  .home-title {
    text-align: center;
    margin-bottom: 50px;
  }

  .home-title h1 {
    font-family: "Press Start 2P", "Orbitron", monospace;
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 4px;
    line-height: 1.2;
    margin: 0;
  }

  .home-title .title-neon {
    color: var(--neon-cyan);
    text-shadow:
      0 0 8px rgba(34, 245, 255, 0.8),
      0 0 22px rgba(34, 245, 255, 0.55),
      0 0 44px rgba(34, 245, 255, 0.35);
    animation: pulse 2.2s ease-in-out infinite;
  }

  .home-title .title-neon.alt {
    color: var(--neon-pink);
    text-shadow:
      0 0 8px rgba(255, 62, 165, 0.8),
      0 0 22px rgba(255, 62, 165, 0.55),
      0 0 44px rgba(255, 62, 165, 0.35);
    animation-delay: 1.1s;
  }

  .home-title .title-slash {
    color: #fff;
    margin: 0 8px;
    opacity: 0.9;
  }

  .home-subtitle {
    margin: 16px 0 0;
    color: var(--text-dim);
    letter-spacing: 8px;
    font-size: 14px;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    max-width: 900px;
    width: 100%;
  }

  .game-card {
    position: relative;
    display: block;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--text);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow:
      0 0 0 1px rgba(34, 245, 255, 0.1) inset,
      0 4px 30px rgba(34, 245, 255, 0.08);
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .game-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transition: left 0.6s ease;
  }

  .game-card:hover::before {
    left: 100%;
  }

  .game-card:hover {
    transform: translateY(-6px);
    border-color: rgba(34, 245, 255, 0.6);
    box-shadow:
      0 0 0 1px rgba(34, 245, 255, 0.2) inset,
      0 12px 40px rgba(34, 245, 255, 0.2),
      0 0 30px rgba(194, 107, 255, 0.15);
  }

  .game-card-icon {
    font-size: 48px;
    margin-bottom: 16px;
    text-shadow: 0 0 20px currentColor;
  }

  .game-card-title {
    font-family: "Orbitron", sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: #fff;
  }

  .game-card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .game-card-tag {
    display: inline-block;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 20px;
    background: rgba(34, 245, 255, 0.1);
    color: var(--neon-cyan);
    border: 1px solid rgba(34, 245, 255, 0.3);
  }

  .game-card.tetris .game-card-icon { color: var(--neon-cyan); }
  .game-card.g2048 .game-card-icon { color: var(--neon-pink); }
  .game-card.schulte .game-card-icon { color: var(--neon-yellow); }
  .game-card.sudoku .game-card-icon { color: #22ff8f; }
  .game-card.minesweeper .game-card-icon { color: #b24bff; }

  .game-card.g2048 .game-card-tag {
    background: rgba(255, 62, 165, 0.1);
    color: var(--neon-pink);
    border-color: rgba(255, 62, 165, 0.3);
  }

  .game-card.schulte .game-card-tag {
    background: rgba(255, 236, 66, 0.1);
    color: var(--neon-yellow);
    border-color: rgba(255, 236, 66, 0.3);
  }

  .game-card.sudoku .game-card-tag {
    background: rgba(34, 255, 143, 0.1);
    color: #22ff8f;
    border-color: rgba(34, 255, 143, 0.3);
  }

  .game-card.minesweeper .game-card-tag {
    background: rgba(178, 75, 255, 0.1);
    color: #b24bff;
    border-color: rgba(178, 75, 255, 0.3);
  }

  .home-footer {
    margin-top: 60px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
  }

  @media (max-width: 600px) {
    .home-page {
      padding: 30px 16px 40px;
    }
    .home-title {
      margin-bottom: 36px;
    }
    .game-grid {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .game-card {
      padding: 22px 20px;
    }
    .game-card-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .game-card-title {
      font-size: 18px;
    }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="home-page">
    <div class="home-title">
      <h1>
        <span class="title-neon">NEON</span>
        <span class="title-slash">/</span>
        <span class="title-neon alt">ARCADE</span>
      </h1>
      <p class="home-subtitle">— 霓虹街机 · 2099 —</p>
    </div>

    <div class="game-grid">
      <a href="tetris.html" class="game-card tetris">
        <div class="game-card-icon">▣</div>
        <div class="game-card-title">TETRIS</div>
        <div class="game-card-desc">经典俄罗斯方块，考验你的反应力和空间思维。</div>
        <span class="game-card-tag">经典</span>
      </a>

      <a href="g2048.html" class="game-card g2048">
        <div class="game-card-icon">✦</div>
        <div class="game-card-title">2048</div>
        <div class="game-card-desc">数字合成益智游戏，合并相同数字挑战 2048！</div>
        <span class="game-card-tag">益智</span>
      </a>

      <a href="schulte.html" class="game-card schulte">
        <div class="game-card-icon">△</div>
        <div class="game-card-title">SCHULTE</div>
        <div class="game-card-desc">舒尔特三角训练，提升你的专注力和注意力。</div>
        <span class="game-card-tag">训练</span>
      </a>

      <a href="sudoku.html" class="game-card sudoku">
        <div class="game-card-icon">#</div>
        <div class="game-card-title">SUDOKU</div>
        <div class="game-card-desc">经典数独游戏，考验你的逻辑推理能力。</div>
        <span class="game-card-tag">逻辑</span>
      </a>

      <a href="minesweeper.html" class="game-card minesweeper">
        <div class="game-card-icon">◈</div>
        <div class="game-card-title">MINESWEEPER</div>
        <div class="game-card-desc">经典扫雷游戏，每一步都是概率与直觉的博弈。</div>
        <span class="game-card-tag">策略</span>
      </a>
    </div>

    <div class="home-footer">
      · 选择一个游戏开始你的霓虹之旅 ·
    </div>
  </div>
</body>
</html>
