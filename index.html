<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>霓虹街机 · Neon Arcade</title>
<link rel="stylesheet" href="style.css?v=6" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Orbitron", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .home-page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 24px;
  }

  .home-title {
    text-align: center;
  }

  .home-title h1 {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1.1;
    margin: 0;
  }

  .home-title .title-cn {
    color: #fff;
    text-shadow:
      0 0 10px rgba(34, 245, 255, 0.6),
      0 0 30px rgba(34, 245, 255, 0.3);
  }

  .home-title .title-cn .neon-cyan {
    color: var(--neon-cyan);
    text-shadow:
      0 0 8px rgba(34, 245, 255, 0.9),
      0 0 24px rgba(34, 245, 255, 0.6),
      0 0 48px rgba(34, 245, 255, 0.3);
  }

  .home-title .title-cn .neon-pink {
    color: var(--neon-pink);
    text-shadow:
      0 0 8px rgba(255, 62, 165, 0.9),
      0 0 24px rgba(255, 62, 165, 0.6),
      0 0 48px rgba(255, 62, 165, 0.3);
  }

  .home-subtitle {
    margin-top: 10px;
    color: var(--text-dim);
    letter-spacing: 4px;
    font-size: 12px;
    font-weight: 400;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 600px;
    width: 100%;
  }

  .game-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px 12px;
    text-decoration: none;
    color: var(--text);
    border: none;
    cursor: pointer;
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    border-radius: 14px;
    background: linear-gradient(145deg, #1a1f3a, #0f1328);
    box-shadow:
      0 6px 0 #0a0d1a,
      0 8px 20px rgba(0, 0, 0, 0.5),
      inset 0 2px 0 rgba(255, 255, 255, 0.05),
      inset 0 -2px 0 rgba(0, 0, 0, 0.3);
    transition: all 0.12s ease;
    overflow: hidden;
  }

  .game-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 14px;
    border: 2px solid transparent;
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(0,0,0,0.2)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .game-btn:hover {
    transform: translateY(2px);
    box-shadow:
      0 4px 0 #0a0d1a,
      0 6px 16px rgba(0, 0, 0, 0.5),
      inset 0 2px 0 rgba(255, 255, 255, 0.05),
      inset 0 -2px 0 rgba(0, 0, 0, 0.3);
  }

  .game-btn:active {
    transform: translateY(6px);
    box-shadow:
      0 0 0 #0a0d1a,
      0 2px 8px rgba(0, 0, 0, 0.4),
      inset 0 2px 4px rgba(0, 0, 0, 0.4),
      inset 0 -1px 0 rgba(255, 255, 255, 0.03);
  }

  .game-btn-icon {
    font-size: 36px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
  }

  .game-btn-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
  }

  .game-btn.tetris .game-btn-icon { color: var(--neon-cyan); text-shadow: 0 0 12px rgba(34,245,255,0.6); }
  .game-btn.g2048 .game-btn-icon { color: var(--neon-pink); text-shadow: 0 0 12px rgba(255,62,165,0.6); }
  .game-btn.schulte .game-btn-icon { color: var(--neon-yellow); text-shadow: 0 0 12px rgba(255,236,66,0.6); }
  .game-btn.sudoku .game-btn-icon { color: #22ff8f; text-shadow: 0 0 12px rgba(34,255,143,0.6); }
  .game-btn.minesweeper .game-btn-icon { color: #b24bff; text-shadow: 0 0 12px rgba(178,75,255,0.6); }

  .home-footer {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .home-page {
      gap: 20px;
      padding: 16px 12px;
    }
    .home-title h1 {
      letter-spacing: 4px;
    }
    .home-subtitle {
      font-size: 10px;
      letter-spacing: 2px;
    }
    .game-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .game-btn {
      padding: 16px 10px;
      gap: 6px;
      font-size: 13px;
    }
    .game-btn-icon {
      font-size: 30px;
    }
    .game-btn-name {
      font-size: 12px;
    }
    .home-footer {
      font-size: 10px;
      letter-spacing: 2px;
    }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="home-page">
    <div class="home-title">
      <h1 class="title-cn">
        <span class="neon-cyan">霓</span><span class="neon-pink">虹</span>街机
      </h1>
      <p class="home-subtitle">— 选择游戏 开始挑战 —</p>
    </div>

    <div class="game-grid">
      <a href="tetris.html" class="game-btn tetris">
        <div class="game-btn-icon">▣</div>
        <div class="game-btn-name">俄罗斯方块</div>
      </a>

      <a href="g2048.html" class="game-btn g2048">
        <div class="game-btn-icon">✦</div>
        <div class="game-btn-name">2048 合成</div>
      </a>

      <a href="schulte.html" class="game-btn schulte">
        <div class="game-btn-icon">△</div>
        <div class="game-btn-name">舒尔特</div>
      </a>

      <a href="sudoku.html" class="game-btn sudoku">
        <div class="game-btn-icon">#</div>
        <div class="game-btn-name">数独</div>
      </a>

      <a href="minesweeper.html" class="game-btn minesweeper">
        <div class="game-btn-icon">◈</div>
        <div class="game-btn-name">扫雷</div>
      </a>
    </div>

    <div class="home-footer">
      NEON ARCADE · 2099
    </div>
  </div>
</body>
</html>
