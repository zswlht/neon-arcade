<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>霓虹街机 · Neon Arcade</title>
<link rel="stylesheet" href="style.css?v=6" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Orbitron", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .home-page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 12px;
    gap: 20px;
    background:
      radial-gradient(ellipse at top, rgba(34, 245, 255, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at bottom, rgba(194, 107, 255, 0.1) 0%, transparent 50%),
      linear-gradient(180deg, #0d1240 0%, #060828 50%, #030418 100%);
  }

  .home-title {
    text-align: center;
  }

  .home-title h1 {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1.1;
    margin: 0;
  }

  .home-title .title-cn {
    color: #fff;
  }

  .home-title .title-cn .neon-cyan {
    color: var(--neon-cyan);
    animation: breathe-cyan 1.5s ease-in-out infinite;
  }

  .home-title .title-cn .neon-pink {
    color: var(--neon-pink);
    animation: breathe-pink 1.5s ease-in-out infinite 0.75s;
  }

  @keyframes breathe-cyan {
    0%, 100% {
      text-shadow:
        0 0 10px rgba(34, 245, 255, 1),
        0 0 30px rgba(34, 245, 255, 0.9),
        0 0 60px rgba(34, 245, 255, 0.7),
        0 0 100px rgba(34, 245, 255, 0.4);
      filter: brightness(1);
    }
    50% {
      text-shadow:
        0 0 20px rgba(34, 245, 255, 1),
        0 0 50px rgba(34, 245, 255, 1),
        0 0 100px rgba(34, 245, 255, 0.8),
        0 0 150px rgba(34, 245, 255, 0.5);
      filter: brightness(1.5);
    }
  }

  @keyframes breathe-pink {
    0%, 100% {
      text-shadow:
        0 0 10px rgba(255, 62, 165, 1),
        0 0 30px rgba(255, 62, 165, 0.9),
        0 0 60px rgba(255, 62, 165, 0.7),
        0 0 100px rgba(255, 62, 165, 0.4);
      filter: brightness(1);
    }
    50% {
      text-shadow:
        0 0 20px rgba(255, 62, 165, 1),
        0 0 50px rgba(255, 62, 165, 1),
        0 0 100px rgba(255, 62, 165, 0.8),
        0 0 150px rgba(255, 62, 165, 0.5);
      filter: brightness(1.5);
    }
  }

  .home-subtitle {
    margin-top: 10px;
    color: var(--text-dim);
    letter-spacing: 4px;
    font-size: 12px;
    font-weight: 400;
  }

  .game-grid-wrap {
    position: relative;
    padding: 14px;
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(34, 245, 255, 0.15), rgba(194, 107, 255, 0.12));
    box-shadow:
      0 0 0 1px rgba(34, 245, 255, 0.5) inset,
      0 0 40px rgba(34, 245, 255, 0.25),
      0 0 80px rgba(194, 107, 255, 0.2);
  }

  .game-grid-wrap::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 18px;
    background: linear-gradient(135deg,
      rgba(34, 245, 255, 0.7),
      rgba(194, 107, 255, 0.7),
      rgba(255, 62, 165, 0.7),
      rgba(34, 245, 255, 0.7));
    filter: blur(8px);
    opacity: 0.5;
    z-index: -1;
  }

  .game-grid-wrap::after {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 18px;
    background: linear-gradient(135deg,
      rgba(34, 245, 255, 0.7),
      rgba(194, 107, 255, 0.7),
      rgba(255, 62, 165, 0.7),
      rgba(34, 245, 255, 0.7));
    filter: blur(8px);
    opacity: 0.5;
    z-index: -2;
    animation: borderFlow 6s linear infinite;
  }

  @keyframes borderFlow {
    0% { filter: blur(8px) hue-rotate(0deg); }
    100% { filter: blur(8px) hue-rotate(360deg); }
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 560px;
    width: 100%;
  }

  .game-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 28px 16px;
    text-decoration: none;
    color: var(--text);
    border: none;
    cursor: pointer;
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    border-radius: 16px;
    background: linear-gradient(180deg, #2a2f55 0%, #181d3d 50%, #0d1230 100%);
    box-shadow:
      0 9px 0 #05070f,
      0 11px 0 #080a18,
      0 14px 35px rgba(0, 0, 0, 0.6),
      inset 0 4px 0 rgba(255, 255, 255, 0.08),
      inset 0 -4px 0 rgba(0, 0, 0, 0.4);
    transition: all 0.08s ease;
    overflow: hidden;
  }

  .game-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 2px solid rgba(255, 255, 255, 0.12);
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 55%);
    pointer-events: none;
  }

  .game-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 45%;
    border-radius: 16px 16px 40% 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    pointer-events: none;
  }

  .game-btn:hover {
    transform: translateY(3px);
    box-shadow:
      0 6px 0 #05070f,
      0 8px 0 #080a18,
      0 10px 25px rgba(0, 0, 0, 0.5),
      inset 0 3px 0 rgba(255, 255, 255, 0.06),
      inset 0 -3px 0 rgba(0, 0, 0, 0.3);
  }

  .game-btn:active {
    transform: translateY(9px);
    box-shadow:
      0 0 0 #05070f,
      0 3px 10px rgba(0, 0, 0, 0.4),
      inset 0 5px 10px rgba(0, 0, 0, 0.5),
      inset 0 -2px 0 rgba(255, 255, 255, 0.02);
  }

  .game-btn-icon {
    font-size: 44px;
    line-height: 1;
    filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.4)) brightness(1.15);
  }

  .game-btn-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
  }

  .game-btn.tetris .game-btn-icon { color: #00f5ff; text-shadow: 0 0 20px rgba(0,245,255,0.8), 0 0 40px rgba(0,245,255,0.4); }
  .game-btn.g2048 .game-btn-icon { color: #ff5cb0; text-shadow: 0 0 20px rgba(255,92,176,0.8), 0 0 40px rgba(255,92,176,0.4); }
  .game-btn.schulte .game-btn-icon { color: #ffe066; text-shadow: 0 0 20px rgba(255,224,102,0.8), 0 0 40px rgba(255,224,102,0.4); }
  .game-btn.sudoku .game-btn-icon { color: #40ff9f; text-shadow: 0 0 20px rgba(64,255,159,0.8), 0 0 40px rgba(64,255,159,0.4); }
  .game-btn.minesweeper .game-btn-icon { color: #d070ff; text-shadow: 0 0 20px rgba(208,112,255,0.8), 0 0 40px rgba(208,112,255,0.4); }

  .home-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.7;
  }

  .sound-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--neon-cyan);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow:
      0 2px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .sound-btn:hover {
    background: rgba(34, 245, 255, 0.1);
    box-shadow:
      0 1px 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05),
      0 0 10px rgba(34, 245, 255, 0.3);
  }

  .sound-btn:active {
    transform: translateY(2px);
    box-shadow:
      0 0 0 rgba(0, 0, 0, 0.3),
      inset 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .sound-btn span {
    line-height: 1;
  }

  @media (max-width: 480px) {
    .home-page {
      gap: 16px;
      padding: 12px 10px;
    }
    .home-title h1 {
      letter-spacing: 4px;
    }
    .home-subtitle {
      font-size: 10px;
      letter-spacing: 2px;
    }
    .game-grid-wrap {
      padding: 8px;
      border-radius: 12px;
    }
    .game-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .game-btn {
      padding: 14px 8px;
      gap: 6px;
      font-size: 13px;
      border-radius: 14px;
      box-shadow:
        0 5px 0 #060810,
        0 6px 16px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.06),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3);
    }
    .game-btn:hover {
      transform: translateY(2px);
      box-shadow:
        0 3px 0 #060810,
        0 4px 12px rgba(0, 0, 0, 0.4),
        inset 0 2px 0 rgba(255, 255, 255, 0.05),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    }
    .game-btn:active {
      transform: translateY(5px);
      box-shadow:
        0 0 0 #060810,
        0 2px 6px rgba(0, 0, 0, 0.3),
        inset 0 2px 4px rgba(0, 0, 0, 0.4);
    }
    .game-btn-icon {
      font-size: 28px;
    }
    .game-btn-name {
      font-size: 11px;
    }
    .home-footer {
      font-size: 10px;
      letter-spacing: 2px;
    }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="home-page">
    <div class="home-title">
      <h1 class="title-cn">
        <span class="neon-cyan">霓</span><span class="neon-pink">虹</span>街机
      </h1>
      <p class="home-subtitle">— 选择游戏 开始挑战 —</p>
    </div>

    <div class="game-grid-wrap">
      <div class="game-grid">
        <a href="tetris.html" class="game-btn tetris">
          <div class="game-btn-icon">▣</div>
          <div class="game-btn-name">俄罗斯方块</div>
        </a>

        <a href="g2048.html" class="game-btn g2048">
          <div class="game-btn-icon">✦</div>
          <div class="game-btn-name">2048 合成</div>
        </a>

        <a href="schulte.html" class="game-btn schulte">
          <div class="game-btn-icon">△</div>
          <div class="game-btn-name">舒尔特</div>
        </a>

        <a href="sudoku.html" class="game-btn sudoku">
          <div class="game-btn-icon">#</div>
          <div class="game-btn-name">数独</div>
        </a>

        <a href="minesweeper.html" class="game-btn minesweeper">
          <div class="game-btn-icon">◈</div>
          <div class="game-btn-name">扫雷</div>
        </a>
      </div>
    </div>

    <div class="home-footer">
      <button class="sound-btn" id="home-sound-btn" title="背景音乐">
        <span id="sound-icon">🔊</span>
      </button>
      NEON ARCADE · 2099
    </div>
  </div>

  <script>
    (function() {
      const soundBtn = document.getElementById('home-sound-btn');
      const soundIcon = document.getElementById('sound-icon');
      let isMuted = true;
      let audioCtx = null;
      let oscillators = [];
      let gainNode = null;

      try {
        isMuted = localStorage.getItem('home_bgm_muted') !== 'false';
      } catch(e) {}

      function updateSoundBtn() {
        soundIcon.textContent = isMuted ? '🔇' : '🔊';
      }

      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          gainNode = audioCtx.createGain();
          gainNode.gain.value = 0.06;
          gainNode.connect(audioCtx.destination);

          const notes = [220, 277.18, 329.63, 392, 329.63, 277.18, 220, 164.81];
          let step = 0;

          function playNote() {
            if (!audioCtx || !gainNode || isMuted) {
              step = (step + 1) % notes.length;
              setTimeout(playNote, 500);
              return;
            }
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = notes[step];
            oscGain.gain.setValueAtTime(0, audioCtx.currentTime);
            oscGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);
            oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
            osc.connect(oscGain);
            oscGain.connect(gainNode);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);

            step = (step + 1) % notes.length;
            setTimeout(playNote, 500);
          }

          playNote();
        } catch(e) {}
      }

      updateSoundBtn();

      soundBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        isMuted = !isMuted;
        updateSoundBtn();
        try {
          localStorage.setItem('home_bgm_muted', String(isMuted));
        } catch(e) {}
        if (!isMuted) {
          initAudio();
          if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
        }
      });

      if (!isMuted) {
        initAudio();
      }
    })();
  </script>
</body>
</html>
