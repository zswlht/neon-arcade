<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NEON SCHULTE · 舒尔特三角训练</title>
<link rel="stylesheet" href="style.css?v=2" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  .back-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    padding: 10px 16px;
    font-family: "Orbitron", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--neon-yellow);
    background: rgba(20, 26, 70, 0.8);
    border: 1px solid rgba(255, 236, 66, 0.4);
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: all 0.2s ease;
    box-shadow: 0 0 12px rgba(255, 236, 66, 0.2);
  }
  .schulte-next-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 20px;
  }
  .schulte-next-display .next-label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px rgba(34, 245, 255, 0.5);
  }
  .schulte-next-display .next-num {
    font-family: "Orbitron", sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow:
      0 0 8px rgba(255, 62, 165, 0.8),
      0 0 20px rgba(255, 62, 165, 0.5);
    min-width: 40px;
    text-align: center;
  }
  @media (max-width: 600px) {
    .schulte-next-display .next-num {
      font-size: 22px;
    }
  }
  .back-btn:hover {
    background: rgba(255, 236, 66, 0.15);
    transform: translateX(-2px);
    box-shadow: 0 0 20px rgba(255, 236, 66, 0.4);
  }
  .top-bar {
    padding-left: 100px;
    padding-right: 100px;
  }
  @media (max-width: 600px) {
    .back-btn {
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      font-size: 11px;
    }
    .top-bar {
      padding-left: 70px;
      padding-right: 20px;
    }
    .title {
        font-size: 20px !important;
        letter-spacing: 2px !important;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <a href="index.html" class="back-btn">← 返回</a>

  <header class="top-bar">
    <h1 class="title">
      <span class="title-neon">霓虹</span>
      <span class="title-neon alt">舒尔特</span>
    </h1>
    <p class="subtitle">— 舒尔特三角训练 —</p>
  </header>

  <!-- ======================= 舒尔特三角训练 ======================= -->
  <main class="stage stage-sudoku active" id="stage-schulte">
    <div class="info-bar">
      <div class="info-item">
        <h3>计时</h3>
        <div class="value" id="schulte-timer">00:00.00</div>
      </div>
      <div class="info-item">
        <h3>最佳</h3>
        <div class="value" id="schulte-best">--:--.--</div>
      </div>
    </div>

    <div class="schulte-next-display">
      <span class="next-label">下一个</span>
      <span class="next-num" id="schulte-next">1</span>
    </div>

    <section class="board-wrap">
      <div class="board-frame">
        <div class="board-corner tl"></div>
        <div class="board-corner tr"></div>
        <div class="board-corner bl"></div>
        <div class="board-corner br"></div>
        <canvas id="schulte-board" width="400" height="400"></canvas>
        <div class="overlay" id="schulte-overlay">
          <div class="overlay-inner">
            <h2 id="schulte-title">舒尔特三角训练</h2>
            <p id="schulte-subtitle">从 1 到 25 按顺序点击数字</p>
            <button class="btn-start" id="schulte-btn-start">▶ 开始训练</button>
          </div>
        </div>
      </div>
    </section>

    <div class="bottom-btns" style="padding: 10px 0;">
      <button class="small-btn" id="schulte-help-btn">❓ 玩法</button>
      <button class="small-btn" id="schulte-mute-btn">🔊 音效</button>
      <button class="small-btn" id="schulte-restart-btn">↺ 重置</button>
    </div>
  </main>

  <footer class="foot">
    <span>· 专注力，是最珍贵的能力 ·</span>
  </footer>

  <script src="schulte.js?v=2"></script>
</body>
</html>
